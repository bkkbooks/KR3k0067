body:
  text: 春春春為青陽爾雅云春為青陽謂萬物生也雲成白鶴易說曰春有白鶴之雲也太簇司律正月律管也蒼靈奉塗文選云句芒神奉塗引道樂正習舞禮將舍奠于先師也女夷鼓歌淮南子曰二月之夕女夷鼓歌以司天和女夷者神名也風回解凍月令歲適載華顏延之詩云昔辭秋未素今巳歲載華乃春也雷方出地見易魚巳上冰月令時屬酸羶日惟甲乙並出月令帝稱太皞以木德王天下神曰句芒少皞氏之子為木官也遲遲春日遲遲稪稪選云播芳蕤之稪稪性仁事貌其性仁其事貌味酸臭羶其味酸其臭羶有司布農事之日天子耕藉田之辰並見月令食羊食麥與羊獻雀見元日注章臺之使以來玉臺詩云驛使前日發章臺傳道長安信早來棠梨宮中燕初至葡萄館裏花正開曲江之會遄至托詩云唐時春放榜進士既捷列名於慈恩寺謂之題名大宴于曲江亭子謂之曲江會器疏以達牲無用牝月令蟲既昭蘇物方駘蕩駘徒改切選云春物方駘蕩民情以鬱陶春光貌禁伐木為其長養獻穜稑周禮云上春王后率六宮之夫人獻穜稑之種干王風人雨物管子曰吾不能以春風風人夏雨雨人吾道窮矣寅賓出日平秩東作蟲鱗音角祀戶祭脾月令條風春風為條風亦曰羊角風榖雨三月中氣也亦曰榆莢雨覩惠風於媚景梁元帝纂要曰春為青春芳春陽春三春九春天曰蒼天風曰陽風惠風暄風柔風景曰媚景和景韶景對韶節以芳時時曰嘉時芳時辰曰良辰嘉辰芳辰節曰佳節華節韶節淑節弱草茂林草曰弱草芳草木曰文木華樹陽林茂林芳林華林水曰緑水陽禽好鳥鳥曰陽鳥時鳥陽禽候鳥時禽好鳥好禽司分少皞氏以燕鳩為司分氏者以其春分來秋分去也道同傳曰日分道同也注云晝夜等日月道同燕至雁來春分之日玄鳥至後五日鴻雁來日夜分分平也草木動萌動也柳三眠而盤地漢武帝苑中瑞柳一日三起三眠也花五出以照人韓詩外傳云草木之花五出也三陽革故正月三陽生也千里共尋隋盧思道詩云聊把一尊酒共尋千里春斗轉東而天下皆春雁向北而嶺邊先暖鶡冠子曰斗柄東指天下皆春雁向北即候雁北也此為三陽日巳改趙衰之愛日爰吹鄒衍之和風傳曰趙衰冬日之日也夏日可畏冬日可愛燕地有寒谷不毛鄒衍將律吹之以召和氣而禾黍生焉詩人之黃鶯出谷詩曰出自幽谷遷于喬木太守之白鹿行春後漢鄭弘為臨淮太守行春有兩白鹿隨車夾轂而行陸凱寄一枝之春色陸凱與范曄相善自江南寄梅一枝詣長安與曄贈詩云折花逢驛使寄與隴頭人江南無所得聊贈一枝春伶倫截六管以和音呂氏春秋云黃帝使伶倫截嶰谷之竹斷二節間長三尺八分吹之以為十二筒以應鳳鳴其雄有六為律其雌有六為呂也換蓂莢而方知歲始寄梅花而以覺春來帝王世紀曰堯時瑞草號蓂莢生于階前每朔日生一葉月半至十五葉自十六日巳後日落一葉至月終而盡落月小盡則餘一葉卷而不落銅盤取露以服風服虔曰天子孟春之月以銅盤取露水服之云服八方之風以其被八音風吹也桃花和雪以沫面虞世南著史略云北齊盧士深妻崔林義之女有才學春日以桃花和雪與兒沫面云取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作妍華取雪白取花紅與兒洗面作華容花非一種簡文帝詩云綺花非二種風絲亂百條日上三竿右詩云日上三竿風露消節移陰管自符河內之灰楊泉記云弘農宜陽金門山小竹為管河內葭草為灰以筒候陽氣故陽管為律陰管為呂以象鳳鳴春動陽鍾又應金門之竹異物論云聽五聲清濁之和然後制為鍾律律中有黃鍾律陽鍾以乾之初九金門之竹見上注鷹化鳩而及候周禮云羅氏仲春獻鳩以養國老鄭玄注取變舊為新宜以養老而助生氣也麥覆雉以當時庾信感春賦云宜春苑中春始歸披香殿裏作春衣苔始緑而藏魚麥才青而覆雉氣變東郊寒收北陸風擺而柔條未緑時熙而嫩草抽黃月令云迎春干東郊北陸主冬寒也文選詩云弱草半抽黃輕條未全緑庭蘭巳香澗蒲猶小風暖而燕南雁北日和而柳暗花明文選詩云葉濃和柳密花盡覺梅疏蘭生未可折蒲小不堪書淮南子云女夷鼓歌以司天和以長百穀禽獸草木燕南雁北春女悲秋士哀知物化矣木鐸規時見下土牛誡候月令云土牛示農耕之早晚也遒人振鐸書注云所以振文教也楚雀緑條陽休之春日詩云蝴蝶映花飛楚雀緑條響璿衡運周歲星更始傳云歲在星紀而淫玄枵注云謂天有十二辰歲星一年一周行運也郊麗迎春之日時聞震蟄之雷鳥聲千種庾子山賦云新年鳥聲千種囀二月楊花滿路飛楊枝一尋張謂感春詩云梧桐三寸葉楊柳一尋枝卦審吉凶周禮龜人以上春釁龜策占兆審卦之吉凶火新榆柳周禮燧人掌火春取榆柳之火候玄鳥而祠高禖月令歌青陽而祭天地後漢書立春日于東郊祭青帝歌青陽舞雲翹辭曰青陽載動根荄巳遂正月改秦諱秦始皇以正月生因名政後諱之改正字從平聲行夏時夏正建寅為正月春秋始事春秋之法書元年春正月者所以敬始事者也象魏懸法周禮云正月之吉始和布令于邦國都鄙使萬民觀之斗建寅位時祠嶽鎮月令云正月之節斗建寅之初又云命祠嶽鎮海瀆星始運於銅渾氣微生於玉琯銅渾以應天之星數目正月則銅渾更始以測一年之星度又正月為三微之月陽氣初生為微以王為琯律中太簇氣至東郊謂立春之日迎春氣也司曆候而命乎太史立春後五日命太史司天曆候書慎滿是釁龜策占兆審卦吉凶也又祭風師行慶惠而及彼兆人月令以應春氣雁序南回斗衡東指貯神水以效祥四時要云立春日貯水謂之神水釀酒不壞養鯉魚而致富陶朱公養魚法取鯉魚二十尾以立春後上庚日放之則生子不相食釁龜見上注祭獺禮記云立春之日東風解凍後五日蟄蟲始振後五日魚上冰雨水之日獺祭魚後五日鴻雁來後五日草木萌動雲晴方喜於雁來沙暖更觀於獺祭並見上注修其封疆而端徑術月令云布農事舍東郊修封疆端術善相丘陵限險原隰云云修祭典耕籍田是月也天子親耕藉田命樂正習舞修祭典命祀嶽鎮海瀆犧牲無用牝孟陽梁元帝纂要云正月為孟陽亦曰孟春上春初春開春發春獻歲亦曰獻歲初歲開歲肇歲芳歲華歲首歲獻進也日月乍逼於虛危昏曉正當於心昴正月日在虛昏昴中曉心中黃昏時昴星正當午位曉時心星正當午位故云昏昴中曉心中日入後二刻半為昏日未出前二刻半為曉漢帝賜羹之候金谷園記云武帝常以正月殺梟為羹以賜群臣食之云使天下之人知殺絶其惡類者也豳人于耜之時詩云三之日于耜正月也豳土多寒至是日方就耕上春建寅見上注六律調元太簇克宣於和煦四時成歲青陽潛運於發生見上木鐸振文彤庭習舞玉管調音於律呂金烏點翼於虛危木鐸振文教也月令云天子乃以元日祈穀于上帝命樂正習舞玉管吹律之管也金烏日也躔在虛危凡中氣前後去節十五日以明天時舉正于中也德惟在木月以建寅見上雲物乍成於白鶴氣候方表於青陽風惟滌滌夏小正云正月啓蟄雉晨雊時有浚風滌滌變暖也木漸欣欣選云木欣欣以向榮元日八節之端履端於始歲旦更始四序端為資始亦云四始又云端日謂履端者也三元之始聖人考曆數以正三元此聖人知命之術歲之元日之元時之元也開甲子於新曆沈佺期詩云洛陽新甲子何日是清明發風光於上春七十二候之初三百六旬之首皆元日也磔雞斬羊宋書歲朔縣官斬羊置其頭于門又磔雞以祠之俗說以厭厲氣裴玄以問河南伏君伏君曰是上氣上升草木萌動羊囓百草雞啄五榖故磔雞斬羊以助生氣放鳩獻雀列子曰邯鄲民以正朝旦獻鳩于簡子簡子大悅厚賞而放之曰正旦放生示有恩也客曰得賞競捕之不如不賞之愈也又地理志滎陽有厄公井沛公避項羽雙鳩集井上故漢時正旦放鳩獻雀巳注于下稱崔實之觴崔實月令云元日進酒降神畢室家尊畢次列于幾之前各上椒酒于家長稱觴舉壽欣欣如也奪戴馮之席東觀漢記戴馮為侍中正旦朝賀百僚畢會帝命群臣能說經史更相難詰義有不通輒奪其席以益通者馮乃重坐五十餘席爆竹鑽榆事巳見上造勝華董勛問禮曰正月一日造勝華以相遺象瑞圖金勝之形又云象西王母正月七日戴勝見武帝于承華殿藏糞帚搜神記云昔有商人歐明乘船過青草湖忽遇風晦暝而逢青草湖君邀歸止家堂宇甚麗謂歐明曰惟君所須富貴金玉等物吾當與卿明未知所答傍有一人私語明曰君但求如願不必餘物明依其人語湖君默然須臾便許及出乃呼如願是一少婢也湖君語明曰君領取至家如要物但就如願所須皆得明至家數年遂大富後至歲旦如願起晏明鞭之如願以頭鑽糞帚中漸沒失所在明家漸貧故今人歲旦糞帚不出戶者恐如願在其中也首祚元正王羲之月儀書云日往月來元正首祚大簇告辰微陽始布罄無不宜和神養素進屠蘇俗說屠蘇乃草菴之名昔有人居草菴之中每歲除夜遺閭里一藥貼令囊浸井中至元日取水置於酒樽合家飲之不病溫疫今人得其方而不知其人姓名但曰屠蘇而已燒骨𩨳歲除夜燒骨𩨳為熙庭助陽氣吞雞風土記云元旦當生吞雞子一枚謂之練形飲墨北齊正旦會侍中黃門郎宣詔勞諸郡上計勞訖命遺紙陳事宜字有脫誤者呼起席書跡濫劣者令飲墨水一升文理孟浪者奪容刀及席事多不録貼畫雞於朱戶歲時紀云元日貼畫雞於戶上插符於其中而百鬼畏之獻彩雀於彤庭孔叢子曰邯鄲人以正旦獻雀於趙王綴以五采王大悅肴列辛盤觴稱椒酒桃板署門而納慶葦繩羅戶以祛災辛盤見下注椒酒見上注山海經云東海度朔山有大桃樹下有二神一日神荼一日鬱壘能啖百鬼故今元日設桃符於門以象之歲時記日設𥯤索於門上以畏百鬼獻羔令節祈穀嘉辰月令天子獻羔開水先薦寢廟又元日祈穀於上帝噀杯銷蜀郡之火災飄雪襯荊州之木屑神仙傳曰欒巴蜀人為尚書正旦大會得酒不飲向西南噀之有司奏巴不恭謝曰臣里失火以此酒為雨救之後蜀郡奏元日成都大火其日東北有大雨至救火雨中有酒氣晉陶侃字士行為荊州牧勑造船官收餘木屑後元日會值大雨雪庭泥於是悉著屑襯覆之朝賀無妨竹爆廣庭荊楚歲時記曰山魈鬼把人則病惡爆竹之聲也松標高戶董勛問禮俗有歲首酌椒酒而飲之者何也以椒性芬香又堪作藥又折松枝于戶以同此義律暖而池冰消玉風和而園柳綻金盤號五辛風土記云元日食五辛以練形以助五藏觴稱萬壽崔實元日稱觴獻壽納慶著椒花之頌祛災獻柏葉之銘晉書劉臻妻獻椒花頌曰旋風周回三朝啓建青陽散輝澄景載煥美哉虛葩爰採爰獻聖容映之永壽於萬庾信正朝賚酒詩正朝辟惡酒新年長命杯柏葉隨銘至椒花逐頌來流星向碗落浮蟻對春開成都方救火蜀使幾時來應乾納祐與日同休文選位正元陽氣和端月朱戶駢羅於仙木歲時記元日造桃板于戶謂之仙木象鬱壘之山桃百鬼所畏緑醽灩於壽杯晉咸康四年十二月丙子正旦會百寮增賜醽緑酒人二升壽杯見上璿璣改度日月重新王悅賀正表曰三辰改運元正啓祚又元肅賀儀曰元正首祚寮璣改度伏惟萬壽云云導和而應鳳應凰履端而獻鳩獻雀月令疏云正月律中太簇黃帝使伶倫自大夏之西崑崙之東取嶰谷之竹制為十二管以聽鳳凰之鳴其應鳳者為律應凰者為呂鳩雀事巳見於上蜀郡火災見上西京水戲漢明帝使博士馬均引東水轉百戲又正月朝造巨獸魚龍曼延如漢西京故事三微始布六律初調白虎通謂正月為三微言陽氣未著為微稱萬壽於彤庭資百福於皇室謂元會也受四海之圖籍膺萬國之貢珍內撫諸夏外接百蠻文選以天子當元會也華元放囚江淹賞士北齊書張華元字滿國為兗州刺史獄有繫囚謂曰三元之始念卿幽閉今給假五日足得展謁親友至期當還也果應期而至梁典謝舉初為太學博士與兄覽預元會江淹一見並皆欽挹曰此可謂御二龍於長途耳戲造魚龍事己見上術呼牛馬五行書云元日向辰至門前呼牛馬六畜進酒降神湔裳度厄玉燭寶典云今人元日至晦日並為酺食士女湔裳度厄人日一二稱雞狗六七為馬人董勛問禮俗曰正月一日為雞二日為狗三日為羊四日為豬五日為牛六日為馬七日為人以陰晴為豐耗正旦畫雞於門七日鏤人於金薄萊羹花勝歲時記云人日以七種菜為羹剪綵為花勝以相遺也漢帝之會承華殿西王母頭戴華勝以正月七日會帝於承華殿宋王之登望仙樓見下注竹葉酒酒名梅花粧武帝女壽陽公主人日臥于含章簷下梅花落公主額上成五出之花拂之不去皇后留之自後有梅花粧是也銘山魏東平王登壽張安仁山銘曰正月七日厥日惟人策我良駟陟彼安仁出述征記飲爵壽陽記云正月七日宋王登望仙樓會群臣父老集於城下令皆飲一爵文武十人拜賀上壽稽董勛之問俗時則罔愆六七為馬人巳見上注考陳氏之見儀事乃不忒劉臻妻陳氏進見儀曰正月七日上人勝于人是也鏤人董勛問禮俗云人日鏤金薄為人以貼屏風戴於頭鬢起自晉代賈充妻李氏夫人云俗人人新年形容改舊從新也熏天述征記云人日作煎餅於中庭謂之熏天捩狗耳翦人形荊楚歲時記云人日夜多鬼鳥過人家槌床打戶捩狗耳滅燈燭以禳之翦形見上趙伯符七日之歡壽陽記曰趙伯符為豫州剌史立義樓每至元日人日七日月半乃於樓上作樂樓下男女盛飾遊看作樂薛道衡二年之歎薛道衡人日詩曰立春才七日離家巳二年人歸落鴈後思發在花前飲竹葉之一觴粧梅花之滿面並見上注上元祭戶遺風荊楚歲時記云今州里風俗望日祭門戶先以柳條插於左右門上乃以酒脯飲食豆粥糕糜祭之觀燈故事涅槃經云如來闍維訖收舍利罌置金床上天人散花奏樂繞城步步燃燈滿十三里火樹唐蘇味道看燈詩云火樹銀花合星橋鐵鎖開喑塵隨馬去明月逐人行燈樓唐玄宗於上陽宮建燈樓高一百五十尺懸以珠玉微風將至鏘然成韻帝女巢成而得仙廣陽記云南方赤帝女人山學道仙鵲以正月一日𠾑柴作巢至十五日巢成後得道升天僧徒雲集而觀雨西域記云摩竭陀國正月十五日僧徒俗衆雲集觀佛舍利放光雨花漢帝之建白馬漢武帝時摩騰竺法蘭以白馬駝經至帝是日設大祭其夜以香火焚釋道二教道經煨燼佛教宛然帝遂建白馬寺玄宗之遊涼州葉法師時與玄宗遊涼州以鐵如意質酒神燈佛火崔液正月望夜遊詩神燈佛火百輪張刻像圖形七寶裝試鼓傾城禰衡被魏武謫為鼓吏正月半試鼓禰衡揚枹為漁陽摻撾淵淵有金石聲四坐為之改容又古詩云九陌連燈影千門共月華傾城出寶騎匝路轉香車燈火千門見上蠶桑百倍續齊諧記云吳縣張成夜見一女立宅東南角謂成曰此地是君蠶室我即地神明日正月半宜作白粥泛膏於上以祭我必當令君蠶桑百倍俄失所在如其言年年大得蠶今人作糕粥謂之粘女財是也無心玉臺詩曰去年正月半本自無心看送酒古詩云漢帝窺桃核齊侯問棗花上元應送酒來在蔡經家卜於紫姑異苑曰其夕迎紫姑神以卜之本人家妾為大婦所妬其日感激而死故世人至是日作其形迎於廁云子胥不在曹姑巳行小姑可出子胥壻也曹姑姑也祀其太乙史記樂書曰漢家祀大乙以昏時祀到明南油西漆梁簡文帝看燈賦云何解東之嘉月值蓂莢之盡開草含春而色動雲飛綵以皆來又云南油俱滿西漆爭然漁陽操曲名見上龍川蠟賦又云蘇徵安息蠟出龍川斜暉交映倒影澄鮮蘇香名也晦日孟春晦日晦者灰也言盡無光是如灰色者月之盡也酺聚大飲之名行樂荊楚歲時記云元日至晦並行樂飲酒送窮金谷園記云昔顓頊帝時宮中生一子性好著浣衣人作新衣與之即裂破以火燒穿暑宮人共號窮子其後以正月晦日死人葬之曰今日送窮子也因此相承號送窮也酹酒玉燭寶典曰元日至晦日並皆酺飲渡水士女悉湔裳酹酒於水濱又臨河渡厄階蓂雕克階月桂盡謂月晦也犯天陳不違晦以犯天忌故戰陳避晦日提月公羊傳提月六鷁退飛提月者何逮是月晦日也何休注提月邊也魯人語也在提月之幾盡朒朓有警春秋不書選云朒朓警閽朔而月見東方為朒晦而月見西方為朓春秋之例不書晦也月晦之初年荊楚歲時記云每月皆有弦望以正月為初年時俗重之以為節時俗以為節見上當酺聚之時值蓂枯之日見上大酺小盡月有小盡有大盡三十日為大盡二十九日為小盡二月日在營室律中夾鍾二月律也柳舒西掖漢武西掖瑞柳又晉書云二月中三月初掊擂柳葉舒雷鳴東隅陶潛詩云仲春通時雨始雷鳴東隅驚蟄之日桃始萃二月節也後五日倉庾鳴後五日鷹化為鳩春分之日燕乃至二月節氣也後五日雷發聲後五日始電東郊祭日祀朝日于東郊獻羔開冰先薦寢廟也楊花風見上榆莢雨庾信湯池碑云仲春則榆莢同流三月則桃花共下無焚山修闔扇皆順陽助氣也巢人乞子以得富昔巢氏時二月二乞得人子歸養之家便大富後以此日出野曰採蓬茲向門前以祭之云迎富豳人擊鼓以迎春周禮仲春晝擊土鼓以迎春也同度量平權衡謂晝夜平則正之云養幼少月令養幼少存諸孤無作事以妨農注典兵役之事時將耕慮妨農功順陽氣以養物無竭川澤無漉陂池無焚山林順陽氣以養物也又云去桎梏正獄訟獻鳩周禮羅氏仲春獻鳩以養國老鄭玄注云春鷹化為鳩變舊為新宜以養老助生養集燕謂燕至也暖日融天和風扇物杏壓園林之香氣柳籠門巷之晴煙上丁二月上丁舍尊於國學後戊春分前後戊日為社日月令命民社云云蘭芽吐玉柳眼挑金仲陽梁元帝纂要云二月仲春仲陽中春淑景亦曰媚景剛日祭馬祭馬祖用剛日中和節時維太平日乃初吉作為令節以殷仲春發揮陽和幽贊生植仲序謂仲春也中和其節助發生之德覃生育之恩助陰陽之交泰表天地之和同當太平之昭代屬初吉之良辰授時建命備物陳儀文選二月初吉詩云朔日良時朔乃為三長日乃為良時二月八日釋氏下生之日迦文成道之時歲時記云二月八日釋氏下生之日迦文成道之時信捨之家建八關齊戒車輪寶蓋七變八會之燈故云今二月八日平旦執香花繞城一匝謂之行城事見下注繞城遊一匝之行本行經云二月八日夜半太子被馬當出天使神牽馬足出至走王內則行城中矣在家守八關之戒阿那經云二月八日當行八關之戒佛經云在家菩薩此日當行八關之齊戒飛鳳盤龍壽陽記梁陳典曰二月八日行城樂歌曰皎鏡壽陽宮四面起香風樓形若飛鳳城勢似盤龍社日祀勾龍共工氏之子曰勾龍能平水土故祀以為社擇元日月令擇元日命民社為祀社稷也春事興故祭之以祈農祥元日謂近春分前後戊日元吉也白社白屋之社青春報本反始親地尊天禮記共工氏之子為后土能平水土故祀以為社故夫子曰大社必受霜露風雨以達天地之氣也社所以親地者也地載萬物天垂萬象取法於天所以尊天親地也社供粢盛所以報本反始也受脤傳曰戎有受脤肉謂受氣于社也升壇李叔達祠社云升壇預結祀詰早肅分司椒蘭平酒酌簠簋撤香箕立社王為群姓立社目大社王自立社曰皇社諸侯為百姓立社曰國武自立社曰侯社大夫以下立社曰置社置社見上夏松殷柏論語秋報春祈春祭所以祈五穀之生秋祭所以報五穀之熟陳平分肉陳平貧時為里中社宰分肉甚均父老善之平曰使平得宰天下亦如此肉矣阮修伐樹晉阮修字子宣伐社樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣封土報功孝經緯曰社土地之主也土地闊不可盡祭故封土為社以報功設齊祭社佛經云世尊見殺牛羊以為社戒之曰地獄滿塞正坐殺害汝等何以為社奉齊守戒則獲福無量矣擇日命民見上瞻榆望杏隋牛弘春祈稷歌云瞻榆東皋望杏開田用憑戩穀佇詠豐年罷社魏志王修字叔治七歲母以社日亡來歲社日修哭甚哀鄰里為之罷社結宗荊楚歲時記云社日四鄰並結宗會社牲醪為屋於樹下先祭神然後饗其胙鄭氏云百家共一社今百家所社宗即共立社之義也三月日在婁星中氣日在胃也律中姑洗三月律也暄景暮春梁元帝纂要曰三月曰暮春亦曰季春晚春殘春餘春未春布德行惠月令布德行惠發倉廩賜貧窮賑之絶聘士禮賢聘名士禮賢者修利隄防導達溝瀆月令薦鞠衣修蠶器月令修蠶器天子薦鞠衣于先帝鞠衣黃桑之服薦于太廟合纍牛騰馬遊牝於牧書駒犢牽書其數清明之日桐始華三月節也後五日田鼠化為鴐後五日虹始見穀雨之日萍始生中氣也後五日鳴鳩拂其羽後五日戴勝降于桑禁捕罝罼翳餧之藥無出國門鳥獸字乳不可傷之無逆天時勸蠶無伐桑柘注愛蠶食也享先蠶而躬蠶以勸蠶事月令云門柳變金庭蘭孕玉氣惟煦景節及殘春畢春九門大合樂命國儺九門磔禳以畢春氣洪範傳曰大樂屬金故磔之於九門抑金扶木畢成春功東方三門不磔春位不穀又且盛德所在無不禳也審量五庫月令云審五庫之量金鐵皮革無或不良嶺外寒食沈佺期詩云嶺外逢寒食春來不見餳洛陽新甲子何日是清明江南草長丘遲與陳伯之書云暮春三月江南草長新花生樹群鶯亂飛北閣之春簡文帝晚春詩云待餘春於北閣藉高晏於南陂東山之士劉孝綽三月三詩云東山富遊士北土無遺彥一言白壁輕片善黃金賤乘舟薦鮪天子始乘舟薦鮪於寢廟出勾達萌月令生氣方盛陽氣發泄勾者畢出萌者盡達柳暗花明燕來鶯老上巳莫春之節上巳之辰古用上巳今用三日空陰不雨陰陽書云三月三日欲陰不雨則蠶善時和氣清蘭亭之會時和氣清八公既登宋武帝三月三日登八公山劉安故臺望城郭如匹帛之繞叢花也四人並出荊楚歲時記三月三日四人並出臨清渚為流杯曲水之飲也帛繞叢林杯流曲水見上三月桃花水上巳竹葉杯桃花水見下注上巳漢禮儀志曰三月上巳日宮人並禊飲於東流水上宋書曰自魏巳後但用三日不用上巳元巳之辰文選莫春之月上巳之辰修禊之事王羲之序曰永和九年歲在癸丑莫春之初會于會稽山陰之蘭亭修禊事也祓禊臨水風俗通曰周禮女巫掌歲時以祓除疾病祓者潔也故于水上盥潔之也溱洧執蘭韓詩曰三月桃花水時鄭國之俗上巳日於溱洧之上執蘭招魂祓除不祥束晳善對而賜金見下注張華能談而稽古竹林七賢論王濟常解禊洛水明日或問昨日遊有何語議王曰張華善說史漢裴逸民敘前言往行歷歷可聽垂乳桐庾信三月三日華林馬射賦云草銜長帶桐垂細乳鳥囀歌來花濃雪聚浮絳棗庾肩吾曲水宴詩云桃花生玉澗柳葉暗金溝踴躍頳魚醉參羌絳棗浮金溝見上蕙畝沈約三日詩云煙光蕙畝氣婉椒臺禊南澗孫綽序以莫春之始解禊南澗之濱也會東堂晉起居注泰和六年三月三日臨流杯酒依東堂小會也南浮橋晉夏統字伸御母病至洛市藥會三月三日洛中王公以下莫不方駕連軫並于南浮橋修禊仲御在船中曝所市藥雖見此輩危坐不搖東流水見下齊諧記殿臨春籞梁沈約三日詩云帳殿臨春籞帷宮繞芳薈芳薈水中籬也駕息蘭田晉張協上巳賦云停輿蕙渚息駕蘭田朱幔虹舒翠幕霓連黍麴荊楚歲時記云取黍麴和菜作羹以厭時氣犢車搜神記盧充三日臨水傍戲遙見水傍有犢車充往開車戶見崔氏女并三歲兒其載因抱兒還充贈金碗乃別薤露歌後漢梁商上巳日會客於洛水酒酣繼以薤露歌周舉歎曰哀樂失時殃咎必至商後果卒蘭亭會見上周公卜邑於洛羽觴隨波秦王置酒於河金人捧劍續齊諧記云晉武帝問尚書郎摯虞曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日俱死一村以為怪乃攜酒至東流水邊洗滌去災因水流以泛觴曲水之義起此帝曰若如所說便非嘉節也尚書郎束晢曰摯虞小生不足以知之臣請說其始昔周公卜洛邑因流水以泛酒故逸詩云羽觴隨波流又秦昭王三日置酒於河曲有金人自泉而出捧水心劍曰令君制有西夏及霸諸侯乃因立名曲水二漢相沿為盛事帝善之賜金五十斤永和之春癸丑之歲罰酒三升得詩一句世說郝隆為桓公宿蠻參軍時賓客大會作詩不成罰酒三升而隆只得詩一句而三巳沈佺期三日詩云九門馳道出三巳禊堂開四筵阮瞻而設會賦云列四筵吉祥於斯塗周禊曲洛周之時禊飲於曲路晉宴晉朝上巳宴上林也寒食禁火之辰遊春之月寒食是仲春之末清明當三月之初禁其煙周之舊制周禮禁其煙周之舊制不因子推也不斷火魏之新規見魏武下桐始開花清明之日桐始開花榆方出火論語鑽鐩改火春取榆柳之火以順陽也二三之月百五之辰歲時記云去冬至一百五日即有疾風甚雨謂之寒食魏武之令魏武帝明罰令曰聞太原至雁門冬至後一百有五日皆絶火食云為介子推且北方沍寒之地老少羸弱將有不堪之患今不得作寒食若犯者家長半歲刑主吏百日刑令長奪一月俸周舉之書後漢周舉遷并州剌史大原舊俗以介子推焚骸一月斷火舉遺書於子推廟云春中食寒一月老少不堪今則三日而巳一月寒食見上三日斷火鄴中記并州俗為介子推斷火食食乾粥三日畫鴨俗雕畫鴨子以相餉鬥雞玉燭寶典曰此節城市尤多鬭雞之戲或雕鏤以相餉遺蹴踘劉向別録云寒食蹴踘黃帝所造本兵勢也蹴踘即毬也鞦韆古今藝術圖曰鞦韆本北方山戎之戲以習輕趫也遺麥粥齊魏收遺景元麥粥祭酪盂孫楚祭子推文曰醴酪二盂醴酪大粳米或大麥為之即今之麥粥醴即今之餳是也內火傳以出內火注內藏也司烜周禮司烜氏仲春以木鐸修火禁于國中注為季春將出火也白鳥拾遺記云文公焚山求子推時有白鳥從煙中斃新煙謂出火也介子推之遺風魏武帝之舊令晉文返國皆封從臣獨忘子推子推題詩于國門以諷之遂隱於綿山文公求之不得乃焚山求之子推燒死因斷火以報之餐盤飲燒飯曰餐俗以備斷火餳粥玉燭寶典曰今人研杏仁為酪煮粥引餳沃之是也
