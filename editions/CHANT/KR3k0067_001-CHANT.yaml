body:
  text: 歲華紀麗序歲華紀麗序夫以氤氳未判混然標有物之名清濁肇分炳爾載流形之域自此二儀並建五德相生星躔潛運於璿璣日舍不停於黃道春萌夏育八節爰授於人時秋肅冬終四氣克成於歲序泊乎時新舜曆蓂換堯階均陰陽於十二管中分晝夜於一百刻內光陰電逝難量開闢之功霜露回環莫測幾終之極良由機張造化織出年華英雄假之以建功建名賢達競之而立言立德遂至天文再郁人道中興編修不泯於鈆毫述作薦輝於霜簡深惟後覺難以周知伏覩昌黎韓公著歲華紀麗者擷奧典之雅言具聯文而廣記所以發詞林之蓊蔚湊學海以汪洋起自元正訖于除歲總成數卷列乃多門非惟鼓吹於詩風抑亦條網乎事類是使古先之言行聚集於見聞成章頗異於編年舉旨無逾乎繫日茲所謂摭時歲華煥之事紀聖賢美麗之言云耳謹序自駢麗之體盛文士往往採集語對以資窘腹如珠叢採壁諸書即休文子慎亦復不廢編纂至唐而俳偶益工初學等書便專取事對今觀歲時一部便有專帙當時崇尚可知巳孝轅語予編此書者以作記事珠可耳若欲借之為四六津梁則去之愈遠信哉繡水沈士龍識吾鹽藏書推鄭簡公家最多其孫藎伯名忠材博雅能讀祖書余借觀其書錄有歲華紀麗目所未覩其本從宋刻抄得爛去末卷二紙又差訛特甚藎伯命余即從原本校正凡改易增減千三百字汝納及友人姚孟承又改五百許字然後可讀時俞羨長刻唐類函併寫一通貽之令入歲時部也海鹽胡震亨識
