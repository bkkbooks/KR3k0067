body:
  text: 冬冬冬為玄英梁元帝纂要云冬為玄英亦曰安寧暮冬三冬九冬玄冬帝稱顓頊神號玄冥司寒魏相曰北方之神顓頊承坎執權而司寒屬水其日壬癸其音羽其數六其性智其事聽其味鹹其臭朽其祀行祭先腎食黍與雁律窮六律氣窮歲暮歲將暮時既昏雲葉浮空文選寒風積浮雲繁冰澌結水立冬日水始水迎寒北郊嚴雲鮑昭冬日詩云嚴雲起亂山白日欲還次兼豆邢子才冬夜直史館詩云兼豆未能飽重衾詎解寒星斗旋臨於亥位金烏送次於房星日舍房星愛日左冬日可愛寒風羽律纔移乾風更肅十月乾風至霜樹盡摧於枯葉玉壺漸結於輕冰見上松秀寒姿冬嶺秀寒松桂榮貞質選桂樹冬榮當北戶墐扉之日詩塞向墐戶以為寒備是東皋穫稻之辰十月穫稻風日風曰寒風勁風嚴風厲風哀風陰風日曰愛日草木草曰寒卉黃草木曰寒木寒柯素木寒條閉塞月令天氣上騰地氣下降天地不通閉塞而成冬蓋藏謹蓋藏循行積聚無有不歛注云謂府庫囷倉之類祁寒書冬祁寒小民惟曰怨咨祁大也云暮詩歲云暮矣三餘董遇曰冬歲之餘夜日之餘雨時之餘為三餘也五夜冬之夜故有甲子之辰十月日居房星律中應鍾立冬而水始成冰月令立冬之月水始冰後五日地始凍雉入大水為蜃虹藏不見小雪而虹藏不見又曰小雪之日虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬也穫稻詩八月剝棗十月穫稻良月傳曰使以十月八良月也就盈數焉水變冬姿霜凝雪態感清商而律變謂秋改火仰碧落以星稀冬節星稀賞死恤孤賞死事恤孤寡戒門修鍵壞城郭戒門閭修關鍵備邊境塞徯徑飾喪紀辨衣裳審棺槨之厚薄移金水德秋改於冬鶴語之辰見下雀化之日家語立冬之日雀入大水為蛤祭寒亥日祭司寒祀地立冬之日祀神州地祇于北郊氣迎北陸景送西郊見上槐檀遽改於歲餘冬取槐檀之火又冬是歲之餘晷度方知其晝短日短星昴以正仲冬隕籜十月隕籜滌塲詩十月滌場農工畢酒掃場穜稑巳納詩十月納禾稼黍稷穜稑蟋蟀入床詩十月蟋蟀入我床下收水澤之賦無令侵削兆民以為天子取怨于下注水賦蟲魚之類澤賦萑蒲之類為儲蓄之謀崔寔注云十月農事畢五谷既登家備儲蓄乃順時令也時當隕蘀節及飲蒸大飲蒸勞農以休息之注十月農事既畢黨正屬民飲酒正齒位是也詩云十月滌場朋酒斯饗是也當昏虛曉中月令值宵長晝短易關市來商旅納貨財便人事四方來集遠方皆至貨財不匱上無乏用百事乃遂築城郭是月也可以築城郭造宮室穿竇窖修囷倉菊謝籬金冰生池玉禮法月推於聰智晨昏星麗於虛張節及始裘月令天子始裘時當納稼見上霜勁盡摧於槁葉眾才搖落嶺寒方秀於長松冬嶺秀長松之色候轉秦正漢書高祖十月始至霸上秦本十月為歲首遂不革焉氣迎魯朔春秋魯以此月告朔寒律後彫於松柏新煙巳改於槐檀見上陽月此時純陰用事嫌其無陽故曰陽月命酒官秫稻必齊麴蘗必時水泉必香陶器必良火齊必得兼用六物酒官監之無有差忒陳祭器命工師效功陳祭器按度程無作淫巧勒工名以考其誠功有不當必行其罪寒焦溪沍溫泉冰並出雪賦嚴凝之氣禮記曰天地嚴凝之氣始于西南而盛于西北是天地之義氣也栗烈之風詩云一之日觱發二之日栗烈馬蝟文選云馬縮如蝟言寒也木冰左傳十三年雨水冰寒也北戶墐扉出雪賦墐泥也躶壤垂繒雪賦十二三漢高祖聞韓王信降匈奴將擊之連戰乘勝逐北至樓煩會大寒士卒墮指者十二三十六七北方苦寒之地墮指者十六七皸瘃上音軍下音卓凍破瘡也漢皸樓煩士卒皸瘃凌兢甘泉賦曰馳閶闔入凌兢凌兢寒顫也桐不華周書時訓云清明之日桐不華則歲有大寒黍可種劉向別傳曰燕地寒谷不生五穀鄒衍吹律呂以煖之溫氣至五穀生因名黍谷毒害鳥獸王莽鑄威斗是日天大寒百官人馬有凍死者漢竇武上表曰今日大寒過節毒害鳥獸城邊竹木皆為傷死飢傷人馬魏武苦寒行曰人馬同時飢鳥失條文選鳥登木而失條人墮指見上不堪月令寒氣摠至人力不堪其皆入室而耐家語食水者善游而耐寒也冬日之陽百物歸之言其煖也陰時則慘文選云在陰則慘在陽則舒挾纊左傳曰楚莊王圍蕭師多寒王撫巡之三軍之土皆如挾纊重衾白鶴語異苑曰晉太康二年南州人見二白鶴語于橋下曰今茲寒不減堯崩年於是飛去黃竹詩穆天子遊黃臺之丘大寒雨雪人多凍死天子遂作黃竹詩以愍之也松柏彫歲寒然後知松柏之後彫狐貉冷文子御狐貉之兼衣又襲狐貉之煖者不憂至寒之心綈袍須賈謂范睢曰范叔一寒如此哉與之以綈袍無褐詩曰無衣無褐何以卒歲慘凜下陰潛而慘凜寒也激冷文選晨風凄以激冷漸軸之冰文選轍含冰以滅肌冰緊於凝泮入地之凍廣雅云北方地苦寒冰厚一尺凍入地一丈稜蔌文選稜稜霜氣蔌蔌風威并凌思玄賦云魚矜鱗而并凌兮凍貌禋于六宗孔安國曰四時也寒暑也日也月也星也水旱也謂之六宗運乎二氣日月運行一寒一暑涉水戰國策曰田單解裘與涉水之老人鑿池呂氏春秋曰衛靈公天寒鑿池宛春曰天寒恐傷民公曰何寒哉春曰君衣狐裘坐熊席四陬有火故不寒民衣敝不補履缺不苴寒矣公曰善遂罷後小民怨咨書曰冬祁寒小民惟曰怨咨君子齋戒月令以侍陰陽之所定十一月日在箕宿律中黃鍾鶡鳥不鳴大雪之日鶡鳥不鳴後五日虎始交後五日荔挺出蚯蚓乃結冬至之日蚯蚓乃結後五日麋角解後五日水泉動節及冰行音諧羽奏昴正仲冬尚書云日短星昴注仲冬也時稱亞歲宋志云魏晉則冬至日受萬國朝賀因小會其儀亞千歲朝表福臻而祥集故陰極以陽生冬至日一陽生視朔良辰左傳僖五年正月辛亥朔日南至公既視朔遂登觀臺以望而書之推元命節桓譚新論曰通曆數家算法推考其紀從上古天文以來訖十一月甲子夜半朔冬至方晝短宵長之際日短至陰陽爭又曰宵長晝短陰極陽生是陽升陰化之初陽初生陰乃化分至啟閉當魯書雲瑞之辰絲竹陶匏是漢賀日長之節左傳凡分至啟閉必書雲物又青鳥氏司啟玄鳥氏司分丹鳥氏司閉伯趙氏司至玉燭實典曰冬至日南長律中黃鍾其管最長故有履長之賀又漢雜記冬至陽氣起君道長故賀夏至陰氣起君道衰故不賀閉關先王以至日閉關商旅不行鑿冰斬木之時鑿冰之月時方薦黍見下泣日在牽牛中氣祁寒剉北陸之金烏大雪語南州之白鶴見上無作土事月令曰無作土事無發室屋及起大眾以固而閉地氣沮泄是謂發天地之房民必疾疫又隨以喪命之曰暢月伐竹斬木伐木取竹箭注云此時堅成可伐取之祀井泉祈祀四海大川名源命宰謹審於門閭命內宰申宮令審門閭謹房室必重閉雖有貴戚近習無有不禁禁民不收於牛馬農有不收藏積聚者馬牛畜獸有放伕者取之不詰注禾在野牛馬傷之人有取者不罪所以戒其主也冬至節次周正周以十一月為正月律移舜琯舜以玉琯定律呂節及薦羔崔寔四人月令冬至日薦黍羔先薦玄冥以及祖禰其進拜謁賀君師一如元日時稱結蚓冬至日蚯蚓結周嵩舉酒周嵩伯仁之弟冬至日舉酒白母跪而泣曰伯仁為人志大才短名重識暗崔浩定儀見下土灰在懸漢書冬至日懸土灰以定陰陽之氣菁茅作貢隋牛弘冬至乾元殿受賀詩云作貢菁茅集來朝圭黻連梁園而巳飛六出雪賦梁王不悅遊于兔園漢殿而曾奏八音漢書天子以冬夏二至御前殿會八能之士陳八音聽樂均度晷景候鍾律權土灰傚陰陽鶡鳥不鳴大雪之日鶡鳥不鳴陽烏緩翼戴禮方遵於坎德十一月盛德在水坎水也羲文俄變於乾爻伏羲斷龜文以立八卦冬至一陽生配乾之初九金翼南飛日南至玉杓北指建于位漢樂曾陳於前殿魯雲爰紀於候臺古候之臺墐扉嚴景北戶墐扉就樂良辰易通卦驗曰冬至日人主於群臣從樂五日以迎目至之禮注從就也陳儀薦宗廟之羊見上表瑞集文昌之雀魏文帝黃初元年冬至日黃雀集于文昌殿前水德方隆陽爻乍振盛吉正持於丹筆後漢盛吉為廷尉每冬至夜定罪決斷妻執燭吉持丹筆夫妻相向垂泣決事王褒更審於黃鍾王褒律令表云師曠吹律知音律數始于黃鍾終于大呂故曰審進履襪後魏崔浩女儀曰近古婦人常以冬至進履襪于舅姑崔駰襪銘有建子之月助養元氣之事祀星辰月令祀昊天上帝于圜丘注冬至日祀五方帝及日月星辰禮壇日短影長周禮冬至日在牽牛影長一丈三尺夏至日在東井影長尺有五寸雪宮既東成雪賦雪宮建于東因齊宣王見孟子于雪宮山乃西峙雪山峙于西域又傳曰太山冬夏有雪謝安詠世說謝氏內集講書俄而雪驟下太傅欣然曰白雪紛紛何所似兄子朗曰散塩空中差可擬兄女道蘊曰未若柳絮因風起曾子歌琴操曰曾子耕梁山雨雪思父母乃作梁山之歌北荒之明月後周劉璠雪賦云似北荒之明月若西崑之閬風雪夢之瓊田陳正見雪詩云九冬飄遠雪六出表豐年睢陽生王樹雲夢起瓊田三月失時左傳云三月雨雪書失時子猷乘舟土子猷雪夜乘舟入剡溪訪戴安道既造門不前而返人問其故答曰乘興而來興盡而返向必見戴婕妤詠扇詩云新裂齊紈素皎絜如霜雪盈尺袤丈雪賦云盈尺則呈瑞于豐年袤丈則表沴于陰德圓璧方珪既因方而成珪亦遇圓而為壁豐年傳曰豐年冬多積雪又凡平地盈尺為大雪時雪時雪不降又曰雨言不時玉樹銀花並詞人取譬擁袁安之門見下注救焦先之屋高士傳焦先為野火燒屋遭冬雪大至屋倒焦袒臥不移人以為死熟視之宛然如故萬頃同縞盻隰則萬頃同縞千巖俱白瞻山則千巖俱白海神來朝太公伏符陰謀曰武王伐紂雨雪十餘日甲子朝五兩車騎止于王師門尚父曰四海之神與河伯來受命詞人末至謝惠連雪賦梁王不悅遊于兔園乃置旨酒命賓友召鄒生延枚叟相如未至居客之右俄而微霰零密雪下甲子見上注庚辰春秋盡異曰庚辰大雪深七尺五騎效靈三英作賦三英即鄒陽枚皋司馬相如也輕雲流風洛神賦髣髴兮若輕雲之蔽月飄颻兮若流風之迴雪郢客歌選客有歌于郢中者為陽春白雪之曲飛燕舞趙飛燕如藝風之迴雪也穿履之行東郭先生久待公車貧困衣履不完行雪中履有上無下足盡踐地閉門而臥洛陽大雪丈餘縣令出見袁安門無行跡謂安巳死令人入戶見安偃臥問安何以不出安曰大雪人皆乏食不宜千人令賢之遂舉孝廉冬夏有山海經云由首之山小威之山空桑之山冬夏常有雪天地寒大戴記曰天地樍陰溫則為雨寒則為雪千里之渡詩云飄飄于里雪倏忽度龍沙五榖之精江勝之書曰雪者五榖之精古今收雪水以浸五榖浸牛目孟子白榺文公葬有日矣天大雨雪至于牛目渡龍沙見上蘇武羊毛蘇武沒于蕃羊毛裹雪食得活王恭鶴氅世說王恭衣鶴氅雪中行望見若神仙積於三冬語曰冬無積雪夏無餘糧飄其六出韓詩外傳云雪花飛六出其雱詩雨雪其雱載塗又雨雪載塗雰雰霏霏詩上天同雲雨雪雰雰又昔我往矣楊柳依依今我來思雨雪霏霏瀌瀌詩雨雪瀌瀌皚皚選積雪皚皚皚皚白貌入隙始綠甍而冐棟終開簾而入隙照書孫康家貧常照雪讀書麻衣曹風以麻衣比色曹風麻衣如雪蘭曲楚謠以幽蘭儷曲宋玉作幽蘭白雪之曲冰履霜而至易曰履霜堅冰至積水所成選云層冰為積水所成生於水而寒於水荀子壯以風而解以風左傳云冰以風壯月令云東風解凍夏蟲疑夏蟲不可以語冰天臺山賦哂夏蟲之疑冰春魚上見上玉甃晉江逌冰賦云穿重城之十仞兮搆玉甃之百節夷盤周禮盛冰之器涸泝凝也淋漓泮也狐聽之而將渡述征記曰河冰始合要狐先行方可渡鼠食之以求生神異記北方有冰厚百丈鼷鼠在冰下重于斤其毛長百尺可為褥卻風寒其肉重于斤凝池束皙曰薄冰凝池非登廟之寶零露垂林非綴冕之飾必將採素璧于層山選圓珠于重泉也琢冰文中子曰巧冶不能銷木良匠不能家冰鳥覆而既因后稷姜原踐巨人跡而生子棄之寒冰上鳥覆翼之後取養之以為后稷魚跳而只為王祥王祥母思生魚河水冰寒魚不可得祥乃泣忽一朝冰開有雙鯉魚躍出得以奉母六尺晁錯上書狐貉之地積陰之處木皮三寸冰厚六尺百丈見土注履薄詩如履薄冰涉春書心之憂危若涉春冰寒覩缾中淮南子曰見一葉之落知歲之暮覩缾中之冰知天下之寒清窺壺內選詩云清如玉壺冰光武渡河光武為王郎所逐至滹沱河兵進急無船不可渡使王霸往視問冰堅否霸恐驚眾還報曰冰牢可渡比眾至河冰巳合矣帝遂得渡慕容蹈海王隱晉書慕容晃上言躬征平郭遠假陛下天地之威精誠感靈海為結冰凌行海中三百餘里冬凝春泮淮南子曰冬則水凝為冰春則冰散為水風結水成見上東海之蠶拾遺記云東海中員嶠山有冰蠶長七寸有鱗角重雪覆之則為繭色有五采北方之鼠見上陷冰之丸後漢清州剌史焦和恐賊乘冰過河多作陷冰丸以投河中賊眾遂潰削冰之火博物志曰削冰令圓舉以向日以艾承其影則有火出以凝之水周禮水有時以凝有時而澤不洽之冰海賦曰陽冰不冶陰火潛然馴致易負重鄧析書曰明君之御民若乘奔而無轡若履冰而負重言其懼也王祥泣而葉公飲莊子葉公曰吾爨無欲清之人今吾朝受命而夕飲冰我其內熱歟句踐抱而袁譚推吳越春秋曰越王念吳欲復怨非一旦也苦思勞心夜以接日冬寒則抱冰魏志袁譚時云三推冰注時冰凍合不得降之未泮迨水未泮渙然渙然冰釋又渙若冰將釋皚皚思玄賦行積冰之皚皚兮清泉沍而不流峨峨楚詞層冰峨峨時燠公羊曰冬至無冰時燠夜結寒冰夜結亦曰朝凝藏冰天子命藏命有司冰方盛取而藏之山人乃取左傳山人取之縣人傳之輿人納之隸人藏之山人謂虞官也採於山陰又云其藏冰也深山窮谷固陰沍寒於是取之納於凌室詩云二之日鑿冰沖沖今之十二月也周十一月為正月十二月為二月故云二之日鑿冰沖沖水聲也又三之日納于凌陰即今之三月凌陰即凌室其冰方盛乃祭司寒傳云其藏冰也乃用黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出天也時祭寒而藏之獻羔而啟之注春分獻羔開冰也豳詩云鑿見上周禮見頒周禮凌人夏頒冰注云暑氣盛王以冰頒賜群臣也慮蟲疑之時不可闕也及狐聽之日于以藏之藏時而日在虛危左傳云古者北陸而藏之即今十二月也西陸朝覿而出之即今二月也出際而烏飛昴畢傳云其周之也徧食肉之家冰皆與焉凌人治鑑盛冰器也有司祭寒三倍為防凌人斬冰三其凌注三倍其冰三之者為消釋度也三時不害傳云徧及于老病則春無凄風秋無苦雨藏則無災又云無災霜雹癘疾不降否則用咎今藏用池之冰棄而不用風不越而殺也開冰祭韭獻羔詩四之日其蚤獻羔祭四之日今之二月也又月令云立春後天子獻羔開冰先薦寢廟桃弧棘矢見上注春治冰鑑祭供夷盤並見周禮凌人冬伐謂將藏也伐冰之家不畜牛羊夏頒見上注春開開冰秋刷見凌人注刷除冰室當更納新冰取順沍寒用資清暑獻羔而啟之見上出火而畢賦左傳云公始用之火出而畢賦自命夫命婦至于老疾無不受冰老病必受見上喪祭亦霑大夫命婦喪浴祭用冰也冰室春開玉壺夏薦致夏蟲之疑闕而為罪遇時燠之變責則難加冬乃無水食祿之家朝廷之祿位賓食喪祭于是乎用之凌人之職祭祀共冰鑑賓客共冰大喪共吏盤冰十二月南斗臨烏大呂中律昏奎曉亢雞乳鵲巢雁鄉而方驗小寒小寒之日雁北向後五日鵲始巢後五日野雉始雊雞乳而始明中氣大寒之日雞始乳後五日鷙鳥方疾後五日水澤腹堅蜡百神於南郊月令蜡百神于南郊為來年祈福于天宗天宗日月星辰也蜡臈日祭之名也習五戎於北面月令乃教畋獵習戎班馬政命僕及七騶咸駕載旌旐授車以級司徒搢村北面誓之注誓眾以軍法將帥講武習射御角力亦教畋獵也天子厲飾天子乃厲飾執弓挾矢以獵厲飾謂戎服而嚴厲其威武之飾星回于天日窮于次月窮于紀星回于天數將紀終磔犬送寒大儺旁傑以送寒氣磔犬殺金以助木氣嘗魚薦廟天子親往嘗魚先薦寢廟徵咸獻於九州九州之人無不咸獻其力以供皇天上帝社稷川澤之神注人非神福不生論所宜於百縣合諸侯制百縣為來歲受朔日與諸侯貢職之數以遠近土地所宜為度以給郊廟之事季冬亦曰暮冬窮冬餘月歲窮歲餘陽德春秋內事曰日者陽德之母也火精范子計然曰日者火精也冠三光之首為七曜之先三光日月星七曜五星與日月也朱炎艷於建陽何晏景福殿賦云開建陽則朱炎艷朱炎日也神州耀乎靈景左太沖詠史詩云皎天舒白日靈景耀神州三足日中陽烏三足九芒日彩九芒麗天易日月麗乎天出地文子曰日出于地萬物蕃息方旭郭璞南郊賦云時當青陽日在方旭半規謝靈運遊南亭詩密林含餘清廷峰隱半規寸晷文選寸晷無留影分陰晉陶侃曰聖人尚惜寸陰凡俗當惜分陰桑榆選云桑榆暮景葵藿傾心向日曝儒士之腹郝隆曬書炙野人之背傳云負日之暄人莫之知也貞明易日月貞明寅餞書寅餞納日火德明輝離為火為日陽精正色說文云日為太陽之精可畏可愛見上不縮不盈土圭測景不縮不盈並明天子與日月並明照四方也久照易云日月得天而能久照出東方出自東方照臨下土在北陸左傳日在北陸而藏冰魯陽揮戈魯陽與韓戰酣日暮揮戈而日退三舍后羿發箭准南子記堯時有十日並出羿射九烏死焉實也說文云日者實也太陽之精就之堯紀就之如日日名陽德陽精大明曜靈踆烏東君陽烏日御曰羲和日狀日中則易杲杲出日春日遲遲如日之升我日斯邁日云暮矣朝東門禮黑冕而朝日于東門之外在西陸日在西陸而出冰劍揮虞公與夏戰日欲落公以劍指日日乃退不落箭射見上逐有夸父山海經云夸父與日爭走乃渴死于道棄杖而成鄧林送有秦皇恨賦秦始皇巡海右而送日冬日陽夏日陰文子言此二者物皆歸之長繩恨無長繩繫白日雙麗文選日月雙麗無二天無二日方中日之方中論遠近而長聞明帝晉明帝少時元帝問曰日近長安近答云只見人從長安來不見人從日邊至及來日集群臣乃言日近帝失色對曰舉頭見日不見長安帝奇之爭小大而難答小兒列子曰孔子東遊見兩小兒辯鬭問其故一兒曰我以日始出時近而日中時遠也一兒曰我以日初時遠而日中時近也一兒曰日初出大如車蓋及日中則如盤盂此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩小兒笑曰孰謂汝多知乎白駒莊子曰人生世中如白駒之過隙赤羽子路曰赤羽若日揭行如揭日月而行騎走莊子曰挾宇宙騎日月扶桑淮南子曰日初出于暘谷登于扶桑入于虞泉若木日所出也既無私照相代而明日月無私照臘祖日為盛臘日為衰五行盛則為祖衰則為臘漢以火德火衰於戌故以戌日為臘魏以上德上衰于辰故以辰日為臘魏以土而用辰見上晉以金而取丑金衰於丑殷曰嘉平別名之也周名大蠟蠟者索也漢改名為臘尹軌或賜於神藥神仙傳尹軌字公度晉大康元年臘日過洛陽城西一家求宿主人以明旦是臘意不容又以曾聞公度名因為設酒至旦乃賜主人神藥一丸而去甄宇不擇於瘦羊東觀漢記甄宇字長文拜博士臘日詔賜羊或言大小肥瘦欲投鉤宇乃取瘦羊後乃詔問瘦羊博士聞盜樹陳留志云范喬邑人臘日盜斫其樹人皆之徉不聞邑人愧而歸之喬曰卿臘日取柴與父母相懽耳矜竊食袁宏後漢書曰韓卓字子助陳留人臘日奴竊食祭先人卓義其心矜而免之祠黃石史記張良於下邳圯橋見老人得書云他目榖城見黃石即我也果見取而寶祀之留侯死并黃石葬之每伏臘上冢祠黃石報有功漢書儀曰報鬼神古之聖賢有功于民者改之而嗤於王莽陳咸王莽篡位還家杜門及臘日咸言我之虞公傳云虞公不臘萬物而索饗祭先祖蠟臘者獵也歲終大祭儺送寒為抑月抑為官皮執戈阼階漢高祖文皇帝矢有飛龍蛇矣鼈挑弧棘矢無樂偶也言矢無限火馳風流言疾也飛磔飛磔雨散剛惡馳之名磔可以厭鬼囚耕父囚耕父於清冷女魃並鬼名清冷淤光殘夔魖與魍象殘野仲而殲淤光皆鬼名惑
