body:
  text: 夏夏夏為朱明時移新節選云初伏新節隆暑赫曦火風暑節亦曰炎節日乃丙丁時當焦苦月令其蟲羽其音徵四月律中仲呂其數七其性禮其事視其味苦其臭焦其祀竈祭先肺帝稱炎帝神號祝融蟲羽音徵祀竈祭肺見上昊天夏日昊天暑雨出書長嬴夏為長嬴永日見書焦泉之曲蘧瑗云春有去雁之歌夏有焦泉之曲榮木之詩陶潛榮木詩序云日月推遷巳復有夏隆熾射雉賦云時暑忽隆熾恢臺文選收恢臺之孟夏兮長養也狼山毒草山海經云狼山多毒草盛夏鳥過之不能去銀塘芳荷李林夏日詩桐枝覆王檻荷葉滿銀塘溫飆炎氣文選朱夏振炎氣溽暑扇溫風爍石流金莊子青春變節赤帝司權火帝為赤帝也晝寢書裙宋書王獻之夏月造羊欣欣著新練裙獻之入見之乃書數幅而去夏處板榻後漢羊茂字季實為東郡守冬坐白羊皮夏處單板榻涼君子而清王侯壽陽山記明義樓南有三浴室上以清王侯中以涼君子下以涼庶類冬巢居而夏穴處晉書肅慎國人如此火居盛德月令夏盛德在火木乃成陰時景梁元帝纂要曰夏曰朱明亦曰長嬴炎夏三夏九夏朱夏司至以伯趙氏為司至者以夏至鳴冬至止伯趙伯勞也司立川烏氏以立夏來立冬去羊茂板榻見上孫登草裳神仙傳孫登夏則居窟室披草裳不賀漢雜事冬至陽事起君子道長故賀夏至陰事起君子道衰故不賀受餉齊春秋何敬叔為長城令清廉夏節忽榜門受餉得米二千餘石代貧乏之人輸租稅也閉關易曰先王以至日閉關商旅不行后不省方榜門見上影長尺有五寸周禮云夏至日在東井宵短至乃宵短凱風扇物赫日流輝麥含秀色文選麥隴多秀色柳結濃陰雲吐奇峰夏雲多奇峰火流永日日永星火萬木皆滋百草悉茂文選靡木不滋無草不茂也避暑之飲光祿大夫劉松北鎮與袁紹子弟日共晏飲常以三伏之日晝夜酣飲以避時暑故河朔有避暑之飲迎夏之郊立夏之日盛德在火迎夏於南天子親往郊也紾綌論語當暑絺綌乘離魏相云南方之神炎帝乘離執衡司夏四月日當昴位斗建巳初月令斗建巳位之初律中仲呂杓指東南孝經緯曰榖雨後十五日斗指東南維為立夏後十五日指巳為小滿立夏之日螻蟈鳴後五日蚯蚓出後五日王瓜生小滿之日苦菜秀中氣後五日靡草死後五日小暑至麥秋百榖初生為春熟為秋故麥以孟夏為秋梅雨梅熟時雨正陽之月正陽月慝未作慝謂陰氣也盛暑之時亦云炎暑畏日揚輝火雲戒節碧樹之流鶯巳老虹梁之語燕咸歸維夏四月維夏清和首夏猶清和祀雨師祈榖實出輕挺重月令挺重囚出輕繫繼長增高無有壞墮驅獸無害五榖飲酎以肅嘗麥慶賜遂行無不欣悅行爵出祿必當其位習盛樂太雩帝自鞀鞸至柷敔皆盛樂也禱祀山川古卿士有益於人者以祈榖實贊拔傑俊進賢良舉長大無起土功無發大衆無伐大樹無妨蠶農無大田獵驅獸而巳忍妨生類登麥收繭並見月令四月八日浴釋迦荊楚歲時記云荊楚以四月八日諸寺各設會香湯浴佛共作龍華會以為彌勒下生之徵也迎彌勒見上注右脅生佛以周昭王二十四年甲寅四月八日自母右脅而生半夜入道年十九歲此日半夜逾城往雪山入道求於六年太子在雪山六年思道不食四月八日成佛溺金像世說孫皓初治國於地中得金像如小兒高皓便著廁前令持籌四日皓語像云今日浴佛來暮陰病懺悔乃瘥全木榻羊茂事見上靈育生而孕先得夢高僧傳曰釋元高小名靈育母寇氏夢見胡僧持傘香花滿坐便即懷胎至四月八日生有異香及光明照壁迄旦乃散因名曰靈育劉宣泣而悲不自勝宋書劉敬宣字萬壽八歲母死四月八日入寺見衆僧浴佛乃下頭上金鏡為母灌佛因泣下悲不自勝八歲見見上九子母荊楚歲時記曰四月八日長沙寺閣下有九子毋神是日市肆之人無子者供養薄餅以乞子往往有驗八字之佛爰來荊楚人相承此日迎八字之佛於金城設榻幢歌鼓以為法華會五香之水乃浴高僧傳靡歌利頭四月八日浴佛以都梁香為青色水鬱金香為赤色水丘隆香為白色水附子香為黃色水安息香為黑色水以灌佛頂五月日居參宿律中蕤賓昏角曉危五月之節日在參昏角中曉危中鳴蜩解鹿夏至之日鹿角解後五日蜩始鳴雲容益峻鶯老無聲麥秋梅夏居高遠眺可以居高明可以遠眺望可以升山林可以處臺榭衆果具繁文選蕤賓之時景風扇物天和氣暖衆果具繁百藥可蓄月令聚蓄百藥無用火南方祀皇地月令祀皇地祗于方丘嶽瀆等神夏至日祀之祭先牧祭于大澤用剛日長日助威稜之勢薰風同長育之恩關市無索門閭無閉開市無索此順陽氣遊牝別群摯騰駒班馬政芒種之日螳蜋之生五月節候後五日瞗始鳴後五日反舌無聲風名黃雀雨曰濯枝風土記曰仲夏大雨名濯枝雨六日方止東南常有風至曰黃雀長風亦曰薰風月次居離斗維建午當陽極陰生之際是養神保壽之辰夏至之日一陰生當正陽以戒月五月為正陽月諒無躁而處身月令飛火輪謂日烏也榮木槿易通說曰夏至之日木槿榮火雲方熾畏景尤長當陰陽分爭之時夏至之日陰陽爭死生分君齊戒百官靜事無刑以定晏陰之所成是齊戒養恬之日君子齊戒處必安靜端午日葉正陽時當中夏採蟾蜍之令節抱朴子曰五月五日採蟾蜍頭有八字者日中時取之陰乾一日以其足畫地即為流水帶其左臂辟惡語鴝鵒之佳辰歲時記以午日取鴝鵒兒毛羽新成者養之皆善語必先剪去舌尖錦幖狀元盧肇午日宮船詩云報道是龍剛不信果然奪得錦幖歸鬼字魏取詩辟兵書鬼字伸印題靈文角黍之秋風土記午日烹鶩角黍又以菰葉裹粽黍以象陰陽相包裹未分也浴蘭之月大戴禮云午日以蘭湯沐浴朱索續漢書午日朱索五色為門戶飾以止惡氣赤符抱朴子曰或問辟五兵之道答以五月五日著赤符於心前祭屈續齊諧記屈原五月五日投汨羅江死楚人哀之至此日以筒貯米投水祭之漢建武元年長沙有人見三閭大夫曰常苦蛟龍所竊今若有惠願以蒲葉裹五色絲纏之則蛟龍畏也祠陳後漢陳臨為蒼梧太守推誠以理臨徵去後本郡以五月五日祠之東門城上令小童潔服而舞長命縷古詩云何人致契闊繞臂雙條達辟兵繒裴玄新語曰五月五日集五綵繒謂之辟兵繒也結廬梁王筠五日詩結廬同楚俗採荽異詩人蓄藥又曰是日競採雜藥夏小正云此日蓄藥以蠲除毒氣鬭百草荊楚記云此日楚人踏百草今人又有鬭百草之戲纏五絲見上忌蓋屋勿曝薦風俗通云此日蓋屋令人頭禿又云不得曝床薦席異苑曰新野庾實嘗于五月五日曝席薦忽見一小兒死于薦下俄失所在其後實女遂亡因相傳以為忌午位初杓一陰潛發當赤帝炎威之際是朱明熾盛之時救屈原以為俗午日競渡荊楚記曰舟救屈原也因句踐以成風越地傳云競渡起于越王句踐月號正陽時惟端午雲簇奇峰之狀簟凝寒水之姿胡廣生世說胡廣本姓黃以五月五日生父惡之盛胡蘆棄江中居人見之收養以為巳于托胡蘆生乃姓胡曹娥死異苑曰曹娥父以五月五日溺死娥巡江號哭七日遂投江死三日後與父尸俱出時當採艾節及浴蘭荊楚歲時記云宗測常以五月五日未雞鳴時採艾見似人處攬而取之用灸有驗燒空之畏日尤長觸戶之炎光益盛見上包菰風土記云午日以菰葉裹黏米以象陰陽之相包裹掛艾荊楚記五月五日楚人皆踏百草採艾為人形掛於戶上以禳毒氣百索繞臂風土記以五綵縷造百索繫臂一名長命縷一名辟兵繒以相餉也五綵纏筒見上熱大暑賦夏侯湛作大暑賦云三伏相仍徂暑彤彤上無纖雲下無微風苦熱行文選苦熱云砂礫銷鑠草木焦卷處涼臺而有鬱蒸之煩浴寒水而有灼爛之苦宇宙雖廣無陰以憩昔聞草木焦今見砂石爛大火灼光炎氣酷烈如熱得涼如渴得漿盛夏之陰萬物歸之言其涼也以瓜鎮心鄭灼字茂照嘗讀書時大熱以瓜鎮心欲涼之也穿岸為室後漢馬援行軍至長沙欲進擊壺頭遇夏暑盛熱穿岸為室以避暑氣炎風畏景火雲赫日云我無所言無庇身如惔如焚惔燎也言熱如火燒風雲鬱其如火天地赫以為爐禋于六宗巳見寒門禋于六宗注中飲于三伏見下暍者莊子曰暍者反凍乎冷風又京房易飛候曰立夏有雲大如車蓋十餘里此陽火之氣必暑有暍者疸心詩云我心疸暑機女抱綜耕夫釋耜曹植云機女與耕夫背暑不期而齊跡向陰不會而成群者也食冰之鼠北方層水之下有鼠食冰肉重千斤作脯以禦熱飛雪之方王仲都服飛雪散能盛暑中使曝坐周焚以火口不言熱而身無汗出涼草杜陽編暑則設迎涼草寒則設鳳首木也寒溪武昌記曰樊山東有小溪夏時凜然常有寒氣故謂之小溪身熱坂漢書西域傳曰罽賓道歷大小頭痛之山赤上身熱之坂頭痛山見上當秦穆公三庚之日史云秦穆公三年初伏注云六月上伏日秦皇置又穆公始為伏祠取夏至後第三庚為初伏第四庚為中伏立秋後初庚為末伏謂之三伏又謂之三旬思葛稚川六甲之符抱朴子曰或問不熱之道答曰立夏或服玄冰丸飛雪散帶六壬六甲符處榭登山可以升山陵可以處臺榭當風交扇巳具伏日食白粥注暑煮釋名曰暑煮也如煮物也當暑太暑溽暑六月暑正暍暑毒暑徂暑六月炎暑熱爇釋名曰熱爇也如火所爇也苦熱酷熱旱熱炎熱升山陵紾絺綌可畏春秋云夏日可畏如熏詩云憂心如熏熏灼爛也旱草木焦枯砂石銷爛見上雲漢之章土龍之象許慎注湯遭大旱作土龍以象雲從龍湯之七年湯七年大旱無一日有雨魯之八月左傳魯僖公三年自十月不雨至次年五月旱旦不為災也從龍易曰雲從龍似虎兵書猛將之雲氣似虎也山既出雲禮曰山川出雲天必降雨易曰雲行雨施雲紀黃帝受命有雲瑞故以雲紀事又有雲官也瑞書有瑞必書不崇朝而遍天下公羊傳曰觸石而出膚寸而合不崇朝而遍雨天下太山雲也不待族而潤寰中莊子內篇廣成子謂黃帝曰自爾治天下雲氣不待族而雨邴生之鶴邴原北海人也遭漢亂隱於遼東徵召不仕時人謂之曰雲間白鶴陸氏之龍世說陸士龍嘗在張華筵上自稱曰雲間陸士龍李陵仰視李陵贈蘇武詩云仰視浮雲馳奄忽互相踰靖節思親陶靖節詩序停雲思親友也霏霏承宇楚辭英英露茅詩英英白雲露彼菅茅荷鍤決渠文選決渠降雨荷鍤成雲油然作雲沛然下雨赤為兵驗黃乃時豐保章氏以五色雲物辨吉凶之祲祥二至二分占視日旁雲色青為蟲白為喪赤為兵荒黑為水黃為豐不興文選朝雲不與而黃潦獨臻可望堯紀望之如雲陽臺朝雲巫峽飛揚高祖歌曰太風起兮雲飛揚決濟五色呈瑞氤氳決濟出岫歸去來辭雲無心以出岫上天詩曰上天同雲雨雪氛氛辨豐凶卜水旱周禮保章氏以五色雲物辨吉凶水旱豐荒之祲祥注云雲色有五以別水旱豐荒赤鳥飛左傳楚雲如衆赤鳥夾日以飛三日太史曰其當王身乎白雲起後漢薊子訓到洛見公卿數十處後皆白雲起薈蔚詩云薈兮蔚兮南山朝躋薈蔚乃雲與之兒屏翳雲師名也奇峰夏雲多奇峰垂天莊子大鵬翼若垂天之雲觸石見上注潤礎淮南子曰山雲蒸柱礎潤出蒼梧歸藏曰有白雲出蒼梧入于大梁至帝鄉莊子乘彼白雲至于帝鄉陰陽聚春秋元命苞云陰陽聚為雲山川氣說文曰雲山川之氣也又西王母有白雲謠云白雲在天丘陵自出道路悠遠山川間之見周穆王傳瑞雲德動天心瑞開雲物凄凄祈祈詩云有淹凄凄與雨祈祈紛紛郁郁史記若煙非煙若雲非雲紛紛郁郁蕭索輪囷是謂慶雲起封中漢武封太山夜有光晝有白雲起於封中覆寶鼎汾陰寶鼎天子祠之黃雲覆焉書瑞分至啓閉必書雲物紀官黃帝以有雲瑞因以雲紀官靉靆氤氳瑞氣慶雲景雲卿雲祥雲瑞雲也非煙非煙非霧五色氤氳皆瑞雲也矞雲瑞應圖曰矞雲其狀外赤內青一曰慶雲金枝玉葉黃帝與蚩尤戰于涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象故作華蓋干呂東方朔十洲記曰青雲干呂連月不散扶日洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黃帝黃雲扶日風風則從箕月離於畢箕星好風春秋緯曰風從箕星揚砂走石詩云月離於畢俾滂沱矣天地噫氣風者天地之噫氣也琴歌其南舜作五絃之琴以歌南風曰南風之薰兮可以解我民之慍兮馬嘶其北古詩胡馬依北風大風歌高祖過沛作大風歌曰大風起兮雲飛揚安得猛士兮守四方秋風辭漢武帝作秋風辭云秋風起兮白雲飛草木黃落兮雁南歸蘭有秀兮菊有芳懷隹人兮不能忘石尤無將故人酒不及石尤風飛廉風伯名也箕星風星名也地籟莊子曰汝聞天籟而未聞地籟注風吹萬物也鳴條太平之代風不鳴條八風見上五風堯時五日一風虎嘯淮南子曰虎嘯而谷風生鳶鳴禮記前有塵埃則載鳴鳶注鳶鳴則風生也易水寒燕丹送荊軻於易水之上軻歌曰風蕭蕭兮易水寒洞庭波楚詞嫋嫋兮秋風洞庭波兮木葉下空穴拱向來巢空穴來風開襟選云憑軒檻以回望向北風而開襟鵲巢淮南子云烏鵲識歲之多風去喬木而巢扶枝鳥路選云風煙有鳥路江漢恨無梁揚仁風袁宏為東郡守謝安授以扇宏曰輒當奉揚仁風慰彼黎庶辟臭腐帝王世紀堯時廚中自生肉脯薄如翣形搖動則風生使食物寒而不臭名曰翣脯從虎風從虎相烏述征記長安宮南靈臺上有相風銅烏遇千里風乃動愈病析酲出選風賦阜財解慍詩云南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮退宋都之鷁左傳六鷁退飛過宋都風也搏南海之鵬莊子觱發栗冽出詩衝孔襲門風賦巽風起兌澤流易巽為風義風以散之鼓動萬物者莫疾乎風飄瓦莊子不怨飄瓦摧木木秀於林風必摧之入松琴曲有風入松拂野驚飆拂野木無靜柯冷冷獵獵並選鼓之以雷霆潤之以風雨易凄風春無妻風景風四氣和為通正謂之景風習習谷風颯颯秋風列子善御列子能乘風又云御風而行冷然善也師曠驟歌左傳師曠曰吾驟歌北風歌南風南風不競歌者吹律以詠八風南風者微故曰不競穆若穆若清風罷兮選秋風罷兮春草生轉蕙泛蘭楚詞光風轉蕙泛崇蘭拔樹發屋項王圍漢三匝風從西北來折木發屋揚沙石楚軍大敗漢王得數千騎遁去君子之德論語庶人之雌宋玉風賦大王之風雄庶人之風雌動沙漚吹死灰見下揚塵庶人之風塕然起於窮巷𡎔堁塵動沙漚吹死灰揚腐餘奪熱紈扇詩常恐秋節至涼飆奪炎熱空穴來見上青蘋末宋玉風賦夫風生于地起於青蘋之末風災飄風不終朝驟雨不終日老子震凌揚子曰震風凌雨然後知夏屋之為帡幪也霾曀詩終風且霾終風且曀海鳥避海鳥曰爰居止於魯東門外展禽曰今茲海其有災也夫廣川之鳥獸恆知避其災是歲也果有大風神女行博物志云太公為灌壇令文王夢婦人哭當道問之曰我太山神女嫁為西海神婦吾行必以疾風暴雨灌壇當吾道不敢以疾風暴雨夢覺白太公三日果有疾風過淜滂出風賦淜上冰切熛怒並風激物之貌蹶石蹶動也發屋見上風災數起國多暴雨木拔書沙揚見上占風占之識老子之來神仙傳老子將去周而出關以升崑崙關令尹喜占風知有神人來過乃掃道以待老子老子知喜命應得道仍以長生術授喜候之知關羽之敗建康實録吳大帝與關羽戰羽乞降大帝以問趙達達曰彼有走氣言降詐也乃使人於路邀之趙達曰雖走必不能脫午時有風觸幃達撫手曰羽至矣果擒關羽而至君子瑞應圖曰離地三尺名為君子之風庶人見上偃禾拔木書歷樹拂堂北齊書曰武衛奚永洛與河內張子信對坐時有鵲鳴於庭樹上鬥而墜焉子信曰鵲不喜向夕若風從西來歷樹拂堂角則夜必有召君輒不得往子信出後果風來至高儼使人召永洛且云敕喚永洛便欲去其妻止之而稱馬墜腰折果免難也八風八節之風五風五日一風十日一雨大王大王風見選少女管輅傳曰時大旱輅云即今當雨樹上巳有少女微風須曳之間雨果至修宮室完邊城不周風至誅有罪斷大刑廣莫風至易緯通義云變色迅雷風烈必變色而作辨聲善候風占聲知吉凶五色各異太皞氏之王天下五方風並異色也八節不同立春條風春分明庶風立夏清明風夏至景風立秋涼風秋分閶闔風立冬廣莫風冬至朔風各有所主以占事也雨雨以潤之秋無苦雨九旬十夜三日淫雨早降零雨其濛驟雨不終日時雨風以散之易祁祁毛詩森森選森森散雨足長安之諺諺云城南韋杜去天尺五杜牧雨詩注中出先生之請晉書云束先生通神明請天三日甘雨零行過恐妨於賢令見風門注知來必信於穴居昔董仲舒讀書於窗下有人自外詣之曰今日必雨仲舒曰吾聞巢居知風穴居知雨君非狐貍必是老鼠遂窺之見其人化為野狐而去罕居之均天澤漢書天文志云畢為罕居洪範傳畢星好雨棧道之霖鈴聲玄宗幸西蜀南至斜答嶺霖雨涉旬於棧道雨中聞鈴聲與雨相應上悼貴妃因採其聲為雨霖鈴寄恨焉時梨園子弟善音律者張野狐從至蜀上即以其曲授之其曲今在法部作解易若濡傳曰道下遇雨若濡天降禮記天降時雨山川出雲月離詩月離于畢俾滂沱矣倒井見選傾盆大雨驅垤鸛使之飛鳴詩鸛鳴于垤言將雨也鞭商羊令其鼓舞家語童謠云天將大雨商羊鼓舞乃一足鳥也近壬子管輅過清河見太守曰天旱何如輅曰今夕當雨傳曰近壬子曰值蒲星中巳有水氣食頃當至果如言禁丙丁俗說久雨不晴禁丙丁乃得晴蟠泥之龍蜀都賦云潛龍蟠于決澤應鳴鼓而興雲雨封穴之蟻易占曰蟻封戶大雨將至洗兵武王伐紂大雨洗兵滅火成都市火甚盛樊英噀酒以滅之雨田疇雨我公田遂及我私害粢盛左傳天作淫雨害於粢盛不節禮記風雨不節則飢以時時雨將降時雨及時之雨也燕飛湘川零陵有石燕遇雨則飛蜧躍淮南子曰黑蜧神虬潛泉而居將雨則躍霡霂益之以霡霂注云霡霂小雨也霈然下雨如晦詩風雨甫如晦伐殷搜神記武王伐殷至河上雨甚疾雷晦冥討邢左傳衛大旱討邢而雨密雨密雨如散絲膏澤多豐年降不破塊鹽鐵論周公之時風不鳴條雨不破塊旬雨必以夜注必隨車漢百里嵩為徐州牧境內旱行部傳車所經甘雨輒降假蓋孔子將行雨而無蓋門人曰商有之孔子曰商之為人甚垾于財不假蓋於子夏護其短也勝裘披雪沐雨則裘不如蓑出劉子霑服諸侯朝天子雨霑服失容止墊巾郭林宗雨中行墊其角巾時人故效之為折角巾社公雨俗說社公不食舊水故近社必有雨也少女風見上漂粟鄒子曰朱買臣學業不休其家曝粟令臣守不覺雨漂粟也流麥高鳳事同上云雨師屏翳為雨師列傳又云赤松子神農時雨師也雲將見莊子愁霖三日雨為霖雨久為愁霖文選愁霖貫秋序夜雨夜雨滴空階五政管子曰五政順時者春雨乃來一旬太平之時五日一風十日一雨六月日在東井律中林鍾夏窮暑退火中寒暑乃退謂季夏及季冬暑變溫風小暑溫風至六月節也後五日蟋蟀居壁後五日鷹乃學胄螢飛腐草大暑日腐草為螢後五日土潤溽暑後五日大雨時行畏日更延於黃道秋陽益熾於炎光簟展輕冰扇搖團月新律將加於煩暑下伏式啓於炎陽簡文帝苦熱詩云六龍駕不息三伏啓炎陽徂暑六月徂暑溫風見上糞田可以糞田疇可以美土礓染綵命有司染綵黼黻文章必以法故無或差忒以供郊廟祭祀之服以為旗章以別貴賤等級之度大雨時行大雨時行乃燒剃行水利以殺草也溫風巳至季夏之日土潤溽暑見上節退早秋時當殺草殺草見上行木命有司入山行木無有斬伐為木未堅成無興土功可資農事不可以典土功不可以合諸侯不可以起兵動衆注云士將用事欲靜也農事糞田疇也伏日秋夏交會之辰金火伏藏之日晉志釋曰立秋以金代火金畏火故至庚日必伏庚者金也故曰伏史記注云六月上伏日秦始皇所置三伏之秋陰陽書曰夏至後第三庚為初伏四庚為中伏立秋後初庚為末伏一時之暑典略曰劉松袁紹於河朔三伏之際晝夜飲酒乃至無知以避一時之暑故河朔間有避暑之飲秦修祠史記秦穆公始為伏祠漢擇日風俗通曰漢中巴蜀高祖用張良策還定三秦蓋君子之所因者本也論功定封加以金帛重復寵異令擇伏日不同凡俗也祠黃石史記留侯既得黃石留侯死并黃石而葬每上冡伏臘祠黃石餐白粥見上當謝安食白粥之辰世說郤超子嘉賓三伏之日詣謝公炎暑熏赫當風交扇猶沽汗流離謝公著故絹汗衫食熱白粥晏然無異郤謂謝公曰非君幾不堪如此也是方朔割賜肉之日漢東方朔為郎伏日上賜諸郎肉朔獨拔劍割肉謂同官曰伏日當早歸諸受賜郎懷肉而去上問朔曰賜肉不待詔何也令自責朔曰受賜不待詔一何無禮也拔劍自割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰令卿自責而反自譽復賜酒一石肉百斤遺細君進湯餅荊楚歲時記云伏日進湯餅名為辟惡餅薦麥瓜月令曰初伏薦麥瓜於祖禰
