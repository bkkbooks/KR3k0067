body:
  text: 秋秋秋為白藏梁元帝纂要云秋為白藏亦曰收成亦曰三秋素秋高秋商秋九秋景當素節又曰節曰素節商節辰曰淒辰霜辰帝稱少皞其帝少皞神號蓐收其神蓐收衆木搖落見秋興賦一葉飄零淮南子曰一葉落而知天下秋白精君其帝少皞其神蓐收白精之君金官之臣少昊金天氏蓐收少皞氏之子曰該為金官矣蕭條野曹植詩云秋風發微涼寒蟬鳴我側原野何蕭條白日忽西匿金祇司矩南齊謝眺七夕賦云金祇司矩火曜方流火旻團露文選秋岸澄夕陰火旻團朝露西墅之接白門思玄賦云蹶白門而東馳兮云臺行乎西墅蹶履也白門秋門也南霄之度征雁陶潛秋詩哀蟬無留響征雁鳴南霄玉帝規時秋白帝也金風屇序盛德在金清景亦曰朗景澄景旻天旻愍也愍萬物之凋零戒以白露申以嚴霜風月商風金風素風凄風高風激風涼風悲風清風秋月皎月皓月素月朗月明月草木白草衰草霜草踈木霜木霜林衰林霜柯霜條屬商其蟲毛其音商其數九其性義其事言其味辛其臭腥其祀門祭先肝天子食魚庶人薦黍月令靈運嘗聞於理棹謝靈運詩云述職期闌暑理棹變金風沈約見詠於縫裙秋夜詩云曀曀螢入霧離離雁出雲巴童暗理瑟漢女夜縫裙露珠低圓雲羅高薄秋雲如羅張季鷹之歌發鱸魚歌曰秋風起兮木葉飛吳江水兮鱸正肥三千里兮家未歸恨禁難兮仰天悲遂挂冠而去班婕妤之悲生紈扇紈扇詩云長恐秋節至涼飆奪炎熱棄之篋笥中恩情中道絶草黃雁歸之歌漢武帝歌云草木黃落兮雁南歸水闊露濃之賦李德賦云秋水闊兮秋露濃盛花落兮歎芙蓉雁過天青蟬鳴露白嫋嫋悲風選云嫋嫋兮秋風凄凄寒日詩云秋日淒淒百卉具腓腓病也涼風用事而衆草病興也露凝白玉菊散黃金秋日詩露凝千片玉菊散一叢金日就高低影雲空點綴陰又云菊散金風起荷疏玉露圓將秋數行雁離夏幾林蟬雲凝愁半嶺露碎纈高天敗蘭文子曰蘭叢欲芳秋風敗乏稿葉秋興賦云野有歸燕隰有翔隼遊氣朝興稿葉夕隕屏輕箑釋纖絺藉莞蒻御夾衣天晃朗以彌高日悠揚而寖微短晷長宵又云何陽烏之短晷覺良夜之方永熠耀燦於門闌蟋蟀鳴於軒屏悲聞宋玉之辭恨入潘安之鬢宋玉九辨悲哉秋之為氣也又潘安仁春秋三十二始生二毛也高梧減韻腐草流輝靈運之詩愁霖冠秋序照鄰之賦秋霖賦云都襄陵之與昏墊風零蒲柳晉顧凱曰蒲柳之姿望秋先零霜敗芝蘭露結蒹葭風生桂樹詩云蒹葭蒼蒼白露為霜文選云秋風生桂枝漢儀斬牲晉書曰漢儀立秋日白郊禮畢始揚威武斬牲於東門以薦廟也周禮擊鼓周禮仲秋夜擊土鼓籥豳詩以迎寒七月日在張星律中夷則河漢方秋天地始肅禾乃登繕囹圄具桎梏斷薄刑決小罪納材葦壞牆垣修官室流火七月流火在金盛德在金葉下高梧煙消弱柳當禇淵彈琴之夕南齊書世祖在東宮賜禇淵銀鏻琵琶又嘗會宴袁粲舍時初秋涼夕風月甚美淵援琴奏別鶴之曲宮商既奏風神諧暢謝莊撫節而嘆曰以無纍之神合有道之器實孫寶署吏之辰漢孫寶為京兆尹立秋日暑吏侯文為東督郵敕曰今月鷹隼始擊當從天氣夜景漸遲於玉漏秋聲將嘯於金風見上立秋立秋日涼風至後五日白露降後五日寒蟬鳴處暑處暑之日鷹乃祭鳥後五日天地始肅後五日禾乃登珠露初圓銀河漸轉隄柳之蟬聲巳急庭莎之蛩韻方多將迓蓐收之轡其神蓐收巳遙炎帝之車夏曰炎帝勵兵月令云賞軍旅武人乃命將帥選士勵兵簡練桀俊專任有功以征不義詰誅暴慢以明好惡順彼遠方登榖是月築場圃登榖天子嘗新先薦寢廟金風改候銀漢橫空凄涼乍變於商聲肅殺巳臨於兌位堤柳煙收渚蓮香裊曉露而長垂珠影涼風而遽振金聲並見上威徵大火律變商風氣迎少皞之車景促羲和之轡圭月初生秋月如圭珠露方滴秋露如珠縷羈五色西京雜記云賈佩蘭在宮時七月七日臨百子池作樂樂畢以五色縷相羈謂之連愛車駐七襄梁何遜七夕詩云仙車駐七襄鳳駕出天潢針鼻之縷庾信七夕賦縷條緊而貫中針鼻細而穿空玉匣之衣庾肩五七夕詩云玉匣卷懸衣針樓開夜扉姮娥隨月落織女逐星歸鵲橋巳成風俗通云織女七夕當渡河使鵲為橋織女將渡吳均齊諧記云桂陽成武丁有仙道忽謂弟子曰七月七夕織女將渡河暫過牽牛吾向以被召明日失所在後世人至今云織女嫁牽牛三秋佳節七夕良辰玉露初下露白故曰玉露銀河巳橫亦曰銀漢雲幄選寂寞雲幄空河鼓爾雅曰河鼓謂之牽牛曝書策曬衣裳王喬則舉手謝世列仙傳云王子喬見桓良曰告我家七月七日待我於緱山頭至時果乘白鶴於山頭望之不得到舉手謝世人數日而去蔡經則鳴鼓還家吳蔡經字方平去家十餘年忽還謂家人曰七月七日王君來到期可多作數百斛飯以供從官至日果然聞金鼓簫管人馬之聲從天而下白鶴翔山上青鳥來殿前七月七日西王母詣漢武忽有青鳥從西而來集殿前曬腹郝隆曬腹中書齋心漢武帝齋心待王母又此月中會日宜齋也穿針眼荊楚記云七夕婦人以綵縷穿七孔針陳幾筵酒脯瓜果於庭中以乞巧或云見天河中有奕奕白氣或耀五色以為徵見便拜得福挂犢鼻竹林七賢傳曰七月七日諸阮庭中鋪陳莫非錦繡阮咸時總角乃豎長竿標大犢鼻褌于庭曰未能免俗聊復共爾靈匹謂織女嫁牽牛瑞光前漢竇皇后傳云后觀津人也少小頭禿不為家人所齒遇七夕夜人皆看織女獨不許后出乃有神光照室為后之瑞作麴曬衣崔氏四民月令其日作麴曬衣龍駕之亂鳳管謝朓詩云回龍駕之容裔亂鳳管之凄鏘瓊佩之結雲裳晉蘇彥詠織女詩云織女思北征牽牛嘆南陽時來嘉慶集整駕巾玉箱瓊珮垂藻蕤霧裾結雲裳悵悵一宵促遲遲別日長中元日在張星中氣斗建申位孟秋之望中氣之辰道門寶蓋獻在中元道經云七月十五日中元地官考校勾搜選天人分別善惡以其日作玄都大獻于玉京山以諸奇異妙好幡幢寶蓋供養之具精膳飲食獻諸衆聖道士於其日講論老子經十方大聖高詠靈篇釋氏蘭盆盛於此日盂蘭盆經云目連以母生餓鬼中至此日以百味五果著盆中供養十方大德而後母得食目連白佛凡弟子孝順者以應奉盂蘭盆供養佛言大善後因之廣為華飾地官考校之元日天人集聚之良辰見上釋氏託生謝承後漢書云佛以癸丑七月十五日寄生于淨住國摩耶夫人腹中至周莊王十年甲寅內四月八日生衆僧解夏荊楚記云十五日僧尼坐草為一歲云四月八日結夏至七月十五日解衆僧長養之節在外恐傷草木蟲類故九十日安居又經云四月八日坐樹下至七月十五日為一歲故曰衆僧解夏露降於五日月令云後五日白露降滋彼三秋中秋乃露滋散而為露結以成霜大戴記曰陽氣勝陰則散為雨露厭浥之行泛灩之彩詩云厭浥行露乃濕貌泛灩露彩也湛湛瀼瀼零露瀼瀼露彼菅茅詩曰英英白雲露彼菅茅託於桐葉蘇子曰人生于世若朝露之寄於桐葉鶴鳴風土記云鶴性警白露降而鳴蟬飲取其潔也盤之中撫仙掌以珠盤擢金莖以承露薤之上薤露歌曰薤上露何易晞潤玉垂珠露之形也晨降楚辭霧露氛其晨降雲依霏而承宇宵零典引曰甘露宵零於豐草下地騰文選云露下地以騰文助海成深張衡奏事曰霧露助海詩人夜行見厭浥之詠君子春履有怵惕之心禮記祭義云春雨露既濡君子履之必有怵惕之心祀親也濕衣之譏劉向説苑曰吳欲伐荊令曰敢有諫者死有舍人少孺子者意欲諫乃懷彈于後園露沾其衣如是三朝王曰子求何苦露沾衣如是對曰園中有樹其端有蟬蟬高居悲鳴吸風飲露不知螳螂在後而螳螂不知黃雀居其後然黃雀又不知臣橾彈居其下臣但捕黃雀不覺露濕其衣此乃視其利不顧其後王遂罷兵綴冠之飾束皙曰零露如珠非綴冠之飾也瑞露德動皇天瑞應圖曰王者施德惠則甘露降瑞呈甘露沈約之謝啓沈約謝賜甘露啓言蒙賜法音寺松葉上甘露臣往年經見不過沾條而巳時或凝結才若輕霧木有玉聚珠聯光粲若是者也鄭平之食羹唐書李林甫女壻髭鬢巳白甫曰明日上賜甘露羹可食之雖皓即當鬢黑明日使食之一夕盡皆變黑若脂之潔甘露一名夭酒一名仁澤其凝如脂其甘如飴如醴之甘見上松柏受而王者養老竹葦沾而王者尊賢晉中興書云王者愛養耆老則甘露降於松柏之上王者尊賢容衆則降于竹葉之上受之以為年紀也三危伊尹説湯曰水之美不過三危之露乃瑞露也五色東方朔曰吉雲之地其國俗之雲氣占吉凶若樂事則滿室雲起五色照人著于草樹皆成五色露珠甚甘表至德之馨且因宵降老子曰天地相合以降甘露人莫之合而自均含孔甘之味不待秋凝見上紀年以為年紀膏露天不愛其道故天降膏露霜三秋降季秋百工休霜降之日則百工休碧霜拾遺記曰廣延國霜色紺碧青女淮南于曰霜神名青女始凝易履霜堅水陰始凝也又云陰勝陽則疑為霜雪露結詩云蒹葭蒼蒼白露為霜有餘酸北齊邢子才冬夜直史館詩云況乃冬之夜霜氣有餘酸殄異類陶潛詩云青松在東園衆草混其奇晨霜殄異類卓然見高枝陰陽之氣大戴記曰霜陰陽之氣也陰氣勝陽則結而為霜刑罰之表春秋感精符曰霜刑罰之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威葛屨詩云糾糾葛屨可以履霜紈扇紈扇詩云皎潔如霜雪駟見國語云駟見而隕霜隕霜而冬裘具駟房星也繭成見上鷹擊霜降則鷹擊豺祭霜降之日豺祭獸馬蹄莊子曰馬蹄可以踐霜雪蠶繭拾遺記圓嶠之山有冰蠶以霜雪覆之然後成繭九鐘之鳴山海經曰豐山有九鍾霜降其鍾自鳴神爐之妙抱朴子曰凝霜雪於神爐採靈芝于嵩嶽殺木元命苞曰霜以殺木霑衣微微沾人衣孝子踐琴操曰履霜操伯奇所作吉甫信後妻之言逐伯奇自傷無罪清晨起履霜乃操琴而鼓之君子履君子履之必有悽愴之心青楸離江淹別賦見紅蘭之受露望青楸之離霜冬裘具國語云隕霜而冬裘具清風至而修城郭宮室婦女成功家語曰霜降而婦功成嫁娶行焉鷹隼乃擊見上雪霜大至月令正月之繁詩人興憂傷之歎見上季秋既降君子有悽愴之心見上不殺草春秋感精符曰王者政令苛則夏下霜誅罰不行則冬霜不殺草乃附木京房易傳曰誅不原情其霜乃附木不下地不教而誅其霜反在草下雪冤淮南子曰鄒衍事主盡忠燕惠王信讒囚衍衍仰天哭天為五月降霜殺菽春秋周十月今月書失時令苛而夏降氣勝而秋零見上月太陰之精淮南子曰月者太陰之情坎宮之德易云坎為月如圭月賦秋月如圭如鉤選云始見西南樓纖纖如玉鉤未映東北墀娟娟似蛾眉度南端北齊邢子才冬夜直史館詩云風音響北牗月影度南端出東嶺陶潛雜詩云白日淪西河素月出東嶺遙遙萬里輝蕩蕩空中影破環抱朴子王生云月初生及既虧之後視之宜如三寸鏡稍稍轉大初如破環漸漸滿也破鏡古詩何當大刀頭破鏡飛上天三七三辰三光七曜並月居其一三五三五而生三五而縮成象在天成象無私日月無私照生于西禮曰大明生于東月生于西陰陽之分夫婦之位也行于北漢書云月立夏夏至行南方赤道曰南陸立冬冬至行北方黑道曰北陸二分則同道二至則相過王郎之善歌一曲世説王曇善歌謝公欲聞之而王名家少年無由得聞後公出東府上山作妓樂遇曇出庾家墓竹中作一曲于時秋月王因舉頭看北林卒曲而去諸妓白謝公曰此乃王郎歌也徐勉之不論五官梁徐勉嘗集門客有虞皓者求五官詹事勉正色答曰今夕只可談風月不宜及公事時人服之牛喘世説吳牛見月而喘謂水牛生江淮間畏熱見月恐其日也故喘鵲飛魏武帝歌曰月明星稀烏鵲南飛夜光淮南子云月一名夜光望舒淮南子云月御曰望舒亦曰纖阿漢東蚌梁庾肩吾望月詩云桂殿月偏來流光引上才圓隨漢東蚌暈逐淮南灰淮南灰見上謝譓對飲謝譓有時獨醉云入吾室者但有清風對吾飲者惟當明月闞澤見名吳會稽先賢傳闞澤年十二夢見名宇灼然在月中後為吳侍中蛾眉見上蟾魄三日成魄皎兮陳風月出皎兮又月出皓兮月出照兮出矣莊子曰日月出矣照臨照臨下土回環謂回環天上也三日成魄鄉飲禮三讓象月之三日成魄一月之光文子百星之明不如一月之光代照日月代照迭微詩日居月諸胡迭而微金精月賦云月以陰靈亦曰金精瑤彩月色玉鉤見上水德金精之正色水德之明輝金波月彩灰暈淮南子曰畫隨灰而月暈闕許慎注曰以蘆灰環闕其一面則月暈亦缺于上蓂莢應月而生落也桂華月中桂樹西園遊曹植詩云清夜遊西園明月澄清景北堂寢陸機詩曰安寢北堂上明月入我牗照之有餘光攬之不盈手麗天易日月麗乎天離畢詩月離于畢從星書月之從星出水淮南子云方諸見月則津而為水高誘注云方諸陰燧大蛤也熟摩拭令熱向月下則生水紈扇班婕妤詩云新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月玉臺月如明照瑤蟾瑤兔蟾輝素娥素月蟾魄並月玉兔金兔陰兔蓂階桂影桂輪日就月將出詩日兄月姊春秋感精符曰人主兄日姊月皆仰人皆仰之具瞻人皆具瞻闕之釋名月闕也言滿則復闕也沒兮謝莊月賦月既沒兮露欲晞朔晦朔月初之名朔蘇也如死復蘇晦月盡之名晦灰也死為灰又月光盡色似灰弦望弦者月半之名初七八為上弦二十二三為下弦望者月滿之名日月遙相望也瑞月德聞皇天慶見於月姮娥奔羿妻竊藥奔月為月中之仙也夏禹過夏禹未遇夢乘舟月中過合璧漢書至德之時日月若合璧重輪漢明帝作太子樂歌四章一曰日重光二曰月重輪三曰星重暉四曰海重潤以贊太子之德三珥軍占曰若月三珥者大臣有喜陰靈見上委照而吳業昌孫堅夫人吳氏夢月入懷生孫策淪精而漢道融漢元后母李氏夢月入懷而生元后入懷見上盈手見上連璧日月連璧孕珠蚌望月而孕珠又月望則蚌蛤實災蝕日月薄蝕天地之災魚減淮南子曰日月蝕而魚腦減麟鬭元命苞云麒麟鬭則日月薄蝕彗星襲月辛慶忌勇猛之將被要離謀殺以劍自刎將死彗星襲月不用其行行道也詩日月告凶不用其行何損於明謂蝕君子之過君子之過如日月之蝕大人之災日月之蝕大人之災遇盈則蝕月盈則蝕與時消息則維其常詩彼月而蝕則維其常謫見於天禮曰婦順不修陰事不得謫見于天月為之蝕故月蝕則后素服而修六宮之職蕩天下之陰事災成襲月劉向説苑云秦胡亥立日月薄蝕熒惑襲月八月日在翼星律中南呂月令享壽星享壽星于南郊祭馬祖祭馬祖于大澤採柏露以明眼續齊諧記鄧紹八月旦入華山採藥見一童子執五綵囊盛柏葉上露如珠滿囊紹問用此何為答曰赤松先生取以明眼言終失所在用朱墨以點頭荊楚記云入月一日以朱墨點小兒頭名為天灸以厭病也習吹命樂正習吹將釋奠乃儺天子乃儺以達秋氣循行犧牲視全具也申嚴刑法申嚴百刑無或枉撓斬殺必當無留有罪嘗麻天子嘗麻先薦寢廟種麥乃勸種麥上丁之日釋奠于國學上戊之辰釋奠于太廟擇元日擇元日命民社謂近秋分前後戊日獻良裘周禮司裘氏為大裘以供王祀天之服仲秋獻良裘天子之服至仲秋而獻獲赤雀以銜書尚書中候曰季秋赤雀銜丹書集周之庭結寶囊以承露梁簡文帝眼明囊賦序云婦人八月旦多以錦翠珠寶為眼明囊因凌晨取露以拭目平權衡是月也日夜分則同度量平權衡案芻豢瞻肥瘠察物色必比類量小大五者備嘗載黃詩云載玄載黃為公子裳其穫八月其穫迎寒周禮仲秋月擊土鼓以迎寒養老授幾杖行糜粥鴈巳過而零其白露白露之日鴻雁來後五日燕雀歸群鳥養羞雷收聲而分彼素秋秋分之日電乃收聲後五日蟄蟲壞戶水始涸祀夕月秋分日祀月于西郊戒清風四民月令曰清風戒寒趣織縑帛剝棗八月剝棗斷壺壺瓠也八月乃斷仲商梁元帝纂要日仲秋仲啇也秋節天子居總章太廟庶人授幾杖是月飬衰老授幾杖九月日在角星律中無射授衣之月詩九月授衣飾服之辰見下是丹鳥含羞之日夏小正曰九月丹鳥羞白鳥羞進也白鳥蚊蛃也當白虎應感之辰帝王世紀曰扶始以季秋下旬夢白帝遺烏彖子旦而升丘見白虎其上有雲感巳而生皋陶于曲阜舉五穀之要農事備修當此月也休百工之作膠漆之作且休伐蛟鼉伐蛟取鼉取黿龜登黿取龜蟋蟀居戶詩蟋蟀在戶鴻雁來賓月令伐薪伐薪為炭必因殺氣嘗稻天子嘗稻先薦寢廟具飭衣裳文繡有恆衣服有量冠帶有常必循其故申嚴法令法令號令務納百官貴賤無不務納以會天地之藏無不宣出親嘗親嘗者嘗群神也天子親嘗使有司祭于群神禮畢告備于天子也既曰鴈來寒露之日鴻雁來賓後五日雀入大水為蛤後五日菊有黃花乃觀豺祭霜降之日豺乃祭獸後五日草木黃落後五日蟄蟲咸俯咸俯見上神倉有司舉五穀之要藏帝藉于中倉祇敬必飭入室命有司寒氣揔至人力不堪其皆入屋獻裘周禮司裘氏季秋獻功裘以待頒賜秩芻命有司合秩芻犧牲以供皇天上帝山川四方之神宗廟社稷之靈為民祈福秩芻者謂草稅也蓄菜蓄人收斂務趣菜注始為御冬之備習吹大享帝于明堂也築場九月築場圃季商元帝纂要云九月日季商未商高秋亦曰暮秋末秋殘秋杪秋亦日授衣重九魏文帝書曰歲往月來忽復九月九日九為陽數而日與月並應故曰重九登高續齊諧記云桓景隨費長房登高謂曰九月九日汝家當有災異急令家人縫絳囊盛茱萸繫臂上登高飲菊花酒其禍乃銷景從其言舉家登山夕還雞犬一時暴死今人九日登高乃其遺事重陽佳辰九旻暮月宋傳亮九月九日登凌囂館賦云重九之佳辰肅晨駕而朝逝九旻之暮月鳴鑾戾行宮謝瞻戲馬臺云聖心眷佳節鳴鑾戾行宮行宮馬臺也商飆凝素籥賀敳九日詩云商飆凝素籥玄覽賁黃圖白衣酒晉陽秋曰陶潛九月九日無酒宅邊摘菊盈把望見白衣人至乃王弘送酒便飲酣醉而歸戲馬臺南齊書云宋武帝為公時在彭城九月九日出遊項羽戲馬臺至今相承以為舊事菊制齡陶潛詩云酒能祛百慮菊為制頽齡萸繫臂西京雜記云九月九日漢武宮中以茱萸繫臂佩茱萸西京雜記云漢武帝宮人賈佩蘭佩茱萸食餌飲菊酒云令人長壽賜芳菊魏文帝與鍾繇書曰九月九日草木遍枯而菊芬然獨秀今奉一束授衣之月落帽之辰見下馬射南齊書南齊以九月九日馬射或説秋金節講習武射象立秋之禮龍山晉書孟嘉字萬年為桓溫參軍溫重之九月九日遊龍山寮佐畢集于時佐吏並著戎服嘉醉有風吹落帽而不知覺溫使左右無言欲觀其所措及如廁溫令孫盛作文嘲之置坐處嘉還見之其答文甚美黃花緑酒黍餌玉燭寶典曰食餌者謂黍秫並收之也菊杯杯中泛菊花
